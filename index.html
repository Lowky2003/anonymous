<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anonymous Bubble Answers</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .page-title {
      text-align: center;
      padding: 36px 20px 6px;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.5px;
      background: linear-gradient(90deg, #c8b6ff, #7ec8e3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .page-subtitle {
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      padding-bottom: 20px;
    }

    /* ── Input area (fixed bottom) ── */
    .input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      gap: 10px;
      padding: 14px 20px;
      background: rgba(15, 12, 41, 0.94);
      backdrop-filter: blur(14px);
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .input-area textarea {
      flex: 1;
      padding: 12px 18px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-size: 15px;
      resize: none;
      height: 48px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-area textarea::placeholder { color: rgba(255,255,255,0.4); }
    .input-area textarea:focus { border-color: rgba(138, 120, 255, 0.6); }

    .input-area button {
      padding: 0 28px;
      border: none;
      border-radius: 24px;
      background: linear-gradient(135deg, #7b5ea7, #5b6abf);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .input-area button:hover { opacity: 0.9; }
    .input-area button:active { transform: scale(0.96); }

    /* ── Attach image button ── */
    .attach-btn {
      width: 48px;
      min-width: 48px;
      height: 48px;
      border: none;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .attach-btn:hover { background: rgba(255,255,255,0.18); }
    .attach-btn:active { transform: scale(0.92); }

    /* ── Image preview strip ── */
    .img-preview-strip {
      display: none;
      position: fixed;
      bottom: 76px;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 8px 20px;
      background: rgba(15, 12, 41, 0.94);
      backdrop-filter: blur(14px);
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .img-preview-strip.show { display: flex; align-items: center; gap: 10px; }
    .img-preview-strip img {
      max-height: 60px;
      max-width: 100px;
      border-radius: 10px;
      object-fit: cover;
    }
    .img-preview-strip .remove-preview {
      background: rgba(224,99,119,0.85);
      border: none;
      color: #fff;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Bubble image ── */
    .bubble-img {
      max-width: 100%;
      border-radius: 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .bubble-img:hover { transform: scale(1.03); }

    /* ── Image lightbox ── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .lightbox.show { display: flex; }
    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 12px;
      object-fit: contain;
    }

    /* ── Bubble reply section ── */
    .bubble-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }
    .reply-toggle {
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
    }
    .reply-toggle:hover { color: #fff; background: rgba(255,255,255,0.12); }
    .replies-container {
      margin-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.15);
      padding-top: 6px;
    }
    .reply-item {
      font-size: 12.5px;
      padding: 4px 0;
      color: rgba(255,255,255,0.85);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      word-break: break-word;
    }
    .reply-item:last-child { border-bottom: none; }
    .reply-time {
      font-size: 10px;
      opacity: 0.4;
      margin-left: 6px;
    }
    .reply-input-row {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }
    .reply-input-row input {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 12px;
      outline: none;
    }
    .reply-input-row input::placeholder { color: rgba(255,255,255,0.35); }
    .reply-input-row button {
      padding: 4px 12px;
      border: none;
      border-radius: 14px;
      background: rgba(255,255,255,0.18);
      color: #fff;
      font-size: 12px;
      cursor: pointer;
    }
    .reply-input-row button:hover { background: rgba(255,255,255,0.28); }

    /* ── Bubble container ── */
    .bubble-wrap {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-content: flex-start;
      gap: 18px;
      padding: 16px 20px 110px;
      min-height: calc(100vh - 130px);
    }

    /* ── Bubble ── */
    .bubble {
      position: relative;
      max-width: 280px;
      min-width: 110px;
      padding: 20px 24px 14px;
      border-radius: 30px;
      color: #fff;
      font-size: 14.5px;
      line-height: 1.6;
      word-break: break-word;
      box-shadow: 0 6px 28px rgba(0,0,0,0.3);
      opacity: 0;
      animation: floatIn 0.5s ease-out forwards,
                 bobbing 5s ease-in-out infinite;
      cursor: default;
      transition: transform 0.2s;
    }
    .bubble:hover { transform: scale(1.06); }

    .bubble .timer {
      display: block;
      margin-top: 10px;
      font-size: 11px;
      opacity: 0.5;
      text-align: right;
    }

    /* 8 colour variants */
    .bubble.c0 { background: linear-gradient(135deg, #7b5ea7cc, #5b6abfcc); }
    .bubble.c1 { background: linear-gradient(135deg, #e06377cc, #f0939bcc); }
    .bubble.c2 { background: linear-gradient(135deg, #3ab0a2cc, #58c5b5cc); }
    .bubble.c3 { background: linear-gradient(135deg, #f2a154cc, #f7c97ecc); }
    .bubble.c4 { background: linear-gradient(135deg, #6886c5cc, #8ea8dbcc); }
    .bubble.c5 { background: linear-gradient(135deg, #c06c84cc, #f67280cc); }
    .bubble.c6 { background: linear-gradient(135deg, #45b7a0cc, #61d4b3cc); }
    .bubble.c7 { background: linear-gradient(135deg, #9b72cfcc, #c49bdbcc); }

    @keyframes floatIn {
      from { opacity: 0; transform: translateY(30px) scale(0.8); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes bobbing {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }

    /* ── Empty state ── */
    .empty-state {
      width: 100%;
      text-align: center;
      color: rgba(255,255,255,0.28);
      font-size: 17px;
      margin-top: 100px;
    }
    .empty-state .icon { font-size: 56px; display: block; margin-bottom: 14px; }

    /* ── Toast notification ── */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      padding: 12px 26px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 500;
      z-index: 200;
      transition: transform 0.35s ease;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: rgba(58,176,162,0.93); color: #fff; }
    .toast.error   { background: rgba(224,99,119,0.93); color: #fff; }

    /* ── Sidebar toggle button ── */
    .sidebar-toggle {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 310;
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 12px;
      background: rgba(123, 94, 167, 0.85);
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.15s;
      backdrop-filter: blur(8px);
    }
    .sidebar-toggle:hover { background: rgba(123, 94, 167, 1); }
    .sidebar-toggle:active { transform: scale(0.92); }

    /* ── Left sidebar ── */
    .sidebar {
      position: fixed;
      top: 0;
      left: -320px;
      width: 300px;
      height: 100vh;
      height: 100dvh;
      z-index: 300;
      background: rgba(20, 17, 50, 0.97);
      backdrop-filter: blur(18px);
      border-right: 1px solid rgba(255,255,255,0.08);
      transition: left 0.3s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar.open { left: 0; }
    .sidebar-overlay {
      position: fixed;
      inset: 0;
      z-index: 290;
      background: rgba(0,0,0,0.45);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .sidebar-overlay.show { opacity: 1; pointer-events: auto; touch-action: none; }
    body.sidebar-open { overflow: hidden; touch-action: none; }

    .sidebar-header {
      padding: 22px 20px 10px 60px;
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(90deg, #c8b6ff, #7ec8e3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .sidebar-section {
      padding: 16px 18px;
      flex-shrink: 0;
    }
    .sidebar-section h3 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 12px;
    }

    /* ── Random pick ── */
    .random-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, #f2a154, #f7c97e);
      color: #1a1a2e;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      margin-bottom: 10px;
    }
    .random-btn:hover { opacity: 0.9; }
    .random-btn:active { transform: scale(0.96); }

    .random-result {
      text-align: center;
      padding: 18px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.06);
      font-size: 18px;
      font-weight: 600;
      color: #f7c97e;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      word-break: break-word;
      line-height: 1.4;
    }
    .random-result.spinning {
      animation: slotSpin 0.1s linear infinite;
    }
    @keyframes slotSpin {
      0%   { opacity: 1; }
      50%  { opacity: 0.5; }
      100% { opacity: 1; }
    }

    /* ── Spin action buttons ── */
    .spin-actions {
      display: none;
      gap: 8px;
      margin-top: 10px;
    }
    .spin-actions.show { display: flex; }
    .spin-actions button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.12s;
    }
    .spin-actions button:hover { opacity: 0.9; }
    .spin-actions button:active { transform: scale(0.94); }
    .spin-actions .remove-btn {
      background: linear-gradient(135deg, #e06377, #f0939b);
      color: #fff;
    }

    /* ── Restore removed ── */
    .restore-btn {
      width: 100%;
      padding: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      background: transparent;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      cursor: pointer;
      margin-top: 10px;
      transition: color 0.2s, border-color 0.2s;
      display: none;
    }
    .restore-btn.show { display: block; }
    .restore-btn:hover { color: #fff; border-color: rgba(255,255,255,0.3); }

    /* ── Vote list ── */
    .vote-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .vote-item {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      transition: background 0.2s;
    }
    .vote-item:hover { background: rgba(255,255,255,0.1); }
    .vote-item .vote-text {
      flex: 1;
      font-size: 14px;
      color: rgba(255,255,255,0.85);
      word-break: break-word;
    }
    .vote-item .vote-count {
      font-size: 13px;
      font-weight: 700;
      color: #c8b6ff;
      min-width: 24px;
      text-align: center;
    }
    .vote-item .vote-btn {
      border: none;
      border-radius: 10px;
      width: 36px;
      height: 36px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.12s;
      background: rgba(123, 94, 167, 0.4);
      color: #fff;
    }
    .vote-item .vote-btn:hover { background: rgba(123, 94, 167, 0.7); }
    .vote-item .vote-btn:active { transform: scale(0.88); }
    .vote-item .vote-btn.voted {
      background: rgba(123, 94, 167, 0.85);
      color: #f7c97e;
    }
    .vote-item .vote-actions {
      display: flex;
      gap: 4px;
    }
    .vote-item .vote-action {
      border: none;
      border-radius: 8px;
      width: 28px;
      height: 28px;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.12s;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.5);
    }
    .vote-item .vote-action:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .vote-item .vote-action:active { transform: scale(0.88); }
    .vote-item .vote-action.del:hover { background: rgba(224,99,119,0.4); }
    .vote-empty {
      text-align: center;
      color: rgba(255,255,255,0.25);
      font-size: 13px;
      padding: 20px 0;
    }
    .reset-info {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      text-align: center;
      padding: 6px 0 10px;
      letter-spacing: 0.3px;
    }
    .reset-info.just-reset {
      color: #58c5b5;
    }

    /* ── Food input row ── */
    .food-input-row {
      display: flex;
      gap: 8px;
    }
    .food-input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .food-input-row input::placeholder { color: rgba(255,255,255,0.35); }
    .food-input-row input:focus { border-color: rgba(138, 120, 255, 0.6); }
    .food-input-row button {
      width: 42px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #3ab0a2, #58c5b5);
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.12s;
    }
    .food-input-row button:hover { opacity: 0.9; }
    .food-input-row button:active { transform: scale(0.9); }

    /* ── Main content offset when sidebar open (desktop) ── */
    body.sidebar-open .page-title,
    body.sidebar-open .page-subtitle,
    body.sidebar-open .bubble-wrap {
      margin-left: 300px;
      transition: margin-left 0.3s ease;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .page-title { font-size: 22px; }
      .bubble { max-width: 90vw; font-size: 14px; padding: 16px 18px 12px; }
      .input-area { padding: 10px 12px; }
      .img-preview-strip { bottom: 68px; padding: 6px 12px; }
      .sidebar { width: 85vw; left: -85vw; }
      body.sidebar-open .page-title,
      body.sidebar-open .page-subtitle,
      body.sidebar-open .bubble-wrap { margin-left: 0; }

      .vote-item { padding: 8px 10px; gap: 5px; }
      .vote-item .vote-text { font-size: 13px; }
      .vote-item .vote-btn { width: 32px; height: 32px; font-size: 14px; }
      .vote-item .vote-action { width: 32px; height: 32px; font-size: 13px; }

      .reply-input-row input { font-size: 14px; padding: 8px 10px; }
      .reply-input-row button { font-size: 13px; padding: 6px 14px; }
      .reply-item { font-size: 13px; }
      .attach-btn { width: 42px; min-width: 42px; height: 42px; font-size: 18px; }
    }
  </style>
</head>
<body>

  <!-- Sidebar toggle -->
  <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle menu">&#9776;</button>

  <!-- Overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Left sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">What to Eat?</div>

    <!-- Add food suggestion -->
    <div class="sidebar-section">
      <h3>&#127860; Add Food</h3>
      <div class="food-input-row">
        <input type="text" id="foodInput" placeholder="e.g. Nasi Lemak" maxlength="100">
        <button id="addFoodBtn">+</button>
      </div>
    </div>

    <!-- Random pick section -->
    <div class="sidebar-section">
      <h3>&#127922; Random Pick</h3>
      <button class="random-btn" id="randomBtn">Spin &amp; Decide!</button>
      <div class="random-result" id="randomResult">Press the button!</div>
      <div class="spin-actions" id="spinActions">
        <button class="remove-btn" id="spinRemoveBtn">&#10060; Remove from spin</button>
      </div>
      <button class="restore-btn" id="restoreBtn">&#128260; Restore removed food</button>
    </div>

    <!-- Vote section -->
    <div class="sidebar-section" style="flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch">
      <h3>&#128077; Vote for Food</h3>
      <div class="reset-info" id="resetInfo"></div>
      <ul class="vote-list" id="voteList">
        <li class="vote-empty">No suggestions yet</li>
      </ul>
    </div>
  </aside>

  <h1 class="page-title">Anonymous Bubble Answers</h1>
  <p class="page-subtitle">Answers disappear after 6 hours &#8987;</p>

  <div class="bubble-wrap" id="bubbleWrap"></div>

  <div class="img-preview-strip" id="imgPreviewStrip">
    <img id="imgPreviewThumb" src="" alt="preview">
    <button class="remove-preview" id="removePreview" title="Remove image">✕</button>
  </div>

  <div class="input-area">
    <button class="attach-btn" id="attachBtn" title="Attach image">📷</button>
    <input type="file" id="imageInput" accept="image/*" style="display:none">
    <textarea id="answerInput" placeholder="Type your anonymous answer…" maxlength="500"></textarea>
    <button id="sendBtn">Send</button>
  </div>

  <div class="lightbox" id="lightbox"><img id="lightboxImg" src="" alt="full"></div>

  <div class="toast" id="toast"></div>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    /* ═══════════════════════════════════════════
       Firebase config loaded from firebase-config.js
       ═══════════════════════════════════════════ */

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const answersRef = db.collection('answers');
    const foodRef    = db.collection('food_suggestions');

    const SIX_HOURS = 6 * 60 * 60 * 1000;
    const COLORS = 8;

    const wrap = document.getElementById('bubbleWrap');
    const input = document.getElementById('answerInput');
    const sendBtn = document.getElementById('sendBtn');
    const toastEl = document.getElementById('toast');
    const attachBtn = document.getElementById('attachBtn');
    const imageInput = document.getElementById('imageInput');
    const imgPreviewStrip = document.getElementById('imgPreviewStrip');
    const imgPreviewThumb = document.getElementById('imgPreviewThumb');
    const removePreview = document.getElementById('removePreview');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    let toastTimer = null;
    let pendingImage = null;  // base64 string of compressed image

    /* ── Helpers ── */
    function showToast(msg, type) {
      toastEl.textContent = msg;
      toastEl.className = 'toast ' + type + ' show';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2400);
    }

    function fmtRemaining(ms) {
      if (ms <= 0) return 'expiring…';
      const h = Math.floor(ms / 3600000);
      const m = Math.floor((ms % 3600000) / 60000);
      return h > 0 ? h + 'h ' + m + 'm left' : m + 'm left';
    }

    /* ── Image compression ── */
    function compressImage(file, maxW, maxH, quality) {
      maxW = maxW || 400;
      maxH = maxH || 400;
      quality = quality || 0.5;
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            let w = img.width, h = img.height;
            if (w > maxW || h > maxH) {
              const ratio = Math.min(maxW / w, maxH / h);
              w = Math.round(w * ratio);
              h = Math.round(h * ratio);
            }
            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    /* ── Attach image handlers ── */
    attachBtn.addEventListener('click', () => imageInput.click());
    imageInput.addEventListener('change', async () => {
      const file = imageInput.files[0];
      if (!file) return;
      try {
        pendingImage = await compressImage(file);
        imgPreviewThumb.src = pendingImage;
        imgPreviewStrip.classList.add('show');
      } catch {
        showToast('Failed to load image', 'error');
      }
      imageInput.value = '';
    });
    removePreview.addEventListener('click', () => {
      pendingImage = null;
      imgPreviewStrip.classList.remove('show');
    });

    /* ── Paste image from clipboard ── */
    input.addEventListener('paste', async (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          e.preventDefault();
          const file = item.getAsFile();
          if (!file) return;
          try {
            pendingImage = await compressImage(file);
            imgPreviewThumb.src = pendingImage;
            imgPreviewStrip.classList.add('show');
          } catch {
            showToast('Failed to load pasted image', 'error');
          }
          return;
        }
      }
    });

    /* ── Lightbox ── */
    lightbox.addEventListener('click', () => lightbox.classList.remove('show'));

    /* ── Render bubbles ── */
    let knownIds = new Set();

    function render(items) {
      if (!items.length) {
        wrap.innerHTML =
          '<div class="empty-state"><span class="icon">💬</span>No answers yet — be the first!</div>';
        knownIds.clear();
        return;
      }

      const newIds = new Set(items.map(a => a.id));
      // Remove bubbles that no longer exist
      wrap.querySelectorAll('.bubble').forEach(el => {
        if (!newIds.has(el.dataset.id)) el.remove();
      });

      const now = Date.now();
      items.forEach((a, i) => {
        const existing = wrap.querySelector('[data-id="' + a.id + '"]');
        if (existing) {
          // Update timer and replies
          const timer = existing.querySelector('.bubble-footer .timer');
          if (timer) timer.textContent = fmtRemaining(SIX_HOURS - (now - a.ts));
          updateReplies(existing, a);
          return;
        }
        // New bubble — animate in
        const bubble = document.createElement('div');
        bubble.className = 'bubble c' + (i % COLORS);
        bubble.dataset.id = a.id;
        bubble.style.animationDelay = '0s, 0s';

        if (a.image) {
          const img = document.createElement('img');
          img.className = 'bubble-img';
          img.src = a.image;
          img.alt = 'image';
          img.addEventListener('click', (e) => {
            e.stopPropagation();
            lightboxImg.src = a.image;
            lightbox.classList.add('show');
          });
          bubble.appendChild(img);
        }

        const txt = document.createElement('span');
        txt.textContent = a.text;
        bubble.appendChild(txt);

        const footer = document.createElement('div');
        footer.className = 'bubble-footer';

        const replyBtn = document.createElement('button');
        replyBtn.className = 'reply-toggle';
        replyBtn.textContent = '💬 Reply' + (a.replies.length ? ' (' + a.replies.length + ')' : '');
        replyBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          const container = bubble.querySelector('.replies-container');
          if (container) {
            container.remove();
            replyBtn.textContent = '💬 Reply' + (a.replies.length ? ' (' + a.replies.length + ')' : '');
          } else {
            openReplies(bubble, a);
          }
        });
        footer.appendChild(replyBtn);

        const timer = document.createElement('span');
        timer.className = 'timer';
        timer.textContent = fmtRemaining(SIX_HOURS - (now - a.ts));
        footer.appendChild(timer);

        bubble.appendChild(footer);

        wrap.appendChild(bubble);
      });
      knownIds = newIds;
    }

    /* ── Reply helpers ── */
    function fmtReplyTime(ts) {
      const d = new Date(ts);
      return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
    }

    function updateReplies(bubble, a) {
      const container = bubble.querySelector('.replies-container');
      if (!container) {
        // Update reply count on the toggle button
        const btn = bubble.querySelector('.reply-toggle');
        if (btn) btn.textContent = '💬 Reply' + (a.replies.length ? ' (' + a.replies.length + ')' : '');
        return;
      }
      // Re-render replies inside open container
      const inputRow = container.querySelector('.reply-input-row');
      container.innerHTML = '';
      a.replies.forEach(r => {
        const div = document.createElement('div');
        div.className = 'reply-item';
        div.textContent = r.text;
        const time = document.createElement('span');
        time.className = 'reply-time';
        time.textContent = fmtReplyTime(r.ts);
        div.appendChild(time);
        container.appendChild(div);
      });
      // Re-add input row
      container.appendChild(buildReplyInput(a.id));
      // Update button count
      const btn = bubble.querySelector('.reply-toggle');
      if (btn) btn.textContent = '💬 Reply (' + a.replies.length + ')';
    }

    function openReplies(bubble, a) {
      let container = bubble.querySelector('.replies-container');
      if (container) container.remove();
      container = document.createElement('div');
      container.className = 'replies-container';
      a.replies.forEach(r => {
        const div = document.createElement('div');
        div.className = 'reply-item';
        div.textContent = r.text;
        const time = document.createElement('span');
        time.className = 'reply-time';
        time.textContent = fmtReplyTime(r.ts);
        div.appendChild(time);
        container.appendChild(div);
      });
      container.appendChild(buildReplyInput(a.id));
      bubble.appendChild(container);
    }

    function buildReplyInput(docId) {
      const row = document.createElement('div');
      row.className = 'reply-input-row';
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.placeholder = 'Write a reply…';
      inp.maxLength = 300;
      const btn = document.createElement('button');
      btn.textContent = 'Send';
      const doSend = async () => {
        const text = inp.value.trim();
        if (!text) return;
        btn.disabled = true;
        try {
          await answersRef.doc(docId).update({
            replies: firebase.firestore.FieldValue.arrayUnion({ text, ts: Date.now() })
          });
          inp.value = '';
        } catch {
          showToast('Reply failed', 'error');
        } finally {
          btn.disabled = false;
        }
      };
      btn.addEventListener('click', (e) => { e.stopPropagation(); doSend(); });
      inp.addEventListener('keydown', (e) => {
        e.stopPropagation();
        if (e.key === 'Enter') { e.preventDefault(); doSend(); }
      });
      inp.addEventListener('click', (e) => e.stopPropagation());
      row.appendChild(inp);
      row.appendChild(btn);
      return row;
    }

    /* ── (Bubble real-time listener is below, after sidebar setup) ── */

    /* ── Submit answer to Firestore ── */
    async function submit() {
      const text = input.value.trim();
      if (!text && !pendingImage) return;
      if (text.length > 500) {
        showToast('Max 500 characters', 'error');
        return;
      }

      sendBtn.disabled = true;
      try {
        const doc = { ts: Date.now() };
        if (text) doc.text = text;
        if (pendingImage) doc.image = pendingImage;
        await answersRef.add(doc);
        input.value = '';
        pendingImage = null;
        imgPreviewStrip.classList.remove('show');
        showToast('Answer sent!', 'success');
      } catch {
        showToast('Failed to send — try again', 'error');
      } finally {
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener('click', submit);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        submit();
      }
    });

    /* ═══════════════════════════════════════════
       Sidebar toggle
       ═══════════════════════════════════════════ */
    const sidebar      = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const sidebarToggle  = document.getElementById('sidebarToggle');

    function toggleSidebar() {
      const open = sidebar.classList.toggle('open');
      sidebarOverlay.classList.toggle('show', open);
      document.body.classList.toggle('sidebar-open', open);
    }
    sidebarToggle.addEventListener('click', toggleSidebar);
    sidebarOverlay.addEventListener('click', toggleSidebar);

    /* ═══════════════════════════════════════════
       Food suggestion system (separate collection)
       ═══════════════════════════════════════════ */
    const voteListEl   = document.getElementById('voteList');
    const randomBtn    = document.getElementById('randomBtn');
    const randomResult = document.getElementById('randomResult');
    const foodInput    = document.getElementById('foodInput');
    const addFoodBtn   = document.getElementById('addFoodBtn');
    const resetInfoEl  = document.getElementById('resetInfo');

    // Track which food docs this browser already voted on
    function getVotedSet() {
      try {
        return new Set(JSON.parse(localStorage.getItem('food_voted') ?? '[]'));
      } catch { return new Set(); }
    }
    function saveVotedSet(set) {
      localStorage.setItem('food_voted', JSON.stringify([...set]));
    }

    let foodItems = [];   // kept in sync by the food onSnapshot listener

    /* ── Add food suggestion ── */
    async function addFood() {
      const text = foodInput.value.trim();
      if (!text) return;
      if (text.length > 100) {
        showToast('Max 100 characters', 'error');
        return;
      }
      addFoodBtn.disabled = true;
      try {
        await foodRef.add({ text, ts: Date.now(), votes: 0 });
        foodInput.value = '';
        showToast('Food added!', 'success');
      } catch {
        showToast('Failed to add — try again', 'error');
      } finally {
        addFoodBtn.disabled = false;
      }
    }
    addFoodBtn.addEventListener('click', addFood);
    foodInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); addFood(); }
    });

    /* ── Render vote list ── */
    function renderVoteList() {
      const voted = getVotedSet();
      const activeFood = foodItems.filter(f => !f.removed);
      if (!activeFood.length) {
        voteListEl.innerHTML = '<li class="vote-empty">No suggestions yet</li>';
        return;
      }

      const sorted = [...activeFood].sort((a, b) => (b.votes ?? 0) - (a.votes ?? 0));
      voteListEl.innerHTML = '';
      sorted.forEach((item) => {
        const li = document.createElement('li');
        li.className = 'vote-item';

        const txt = document.createElement('span');
        txt.className = 'vote-text';
        txt.textContent = item.text;

        const count = document.createElement('span');
        count.className = 'vote-count';
        count.textContent = Math.max(0, item.votes ?? 0);

        const btn = document.createElement('button');
        btn.className = 'vote-btn' + (voted.has(item.id) ? ' voted' : '');
        btn.innerHTML = voted.has(item.id) ? '&#9989;' : '&#128077;';
        btn.addEventListener('click', () => castVote(item.id));

        const actions = document.createElement('div');
        actions.className = 'vote-actions';

        const delBtn = document.createElement('button');
        delBtn.className = 'vote-action del';
        delBtn.innerHTML = '&#128465;';
        delBtn.title = 'Delete';
        delBtn.addEventListener('click', () => deleteFood(item.id, item.text));

        actions.append(delBtn);
        li.append(txt, count, btn, actions);
        voteListEl.appendChild(li);
      });
    }

    async function castVote(docId) {
      const voted = getVotedSet();
      const alreadyVoted = voted.has(docId);

      // If "undoing" but Firestore votes is already 0, just clear local state
      if (alreadyVoted) {
        const item = foodItems.find(f => f.id === docId);
        if (item && (item.votes ?? 0) <= 0) {
          voted.delete(docId);
          saveVotedSet(voted);
          renderVoteList();
          return;
        }
      }

      // Update localStorage FIRST so onSnapshot render picks up the new state
      if (alreadyVoted) {
        voted.delete(docId);
      } else {
        voted.add(docId);
      }
      saveVotedSet(voted);
      renderVoteList();

      try {
        await foodRef.doc(docId).update({
          votes: firebase.firestore.FieldValue.increment(alreadyVoted ? -1 : 1)
        });
        showToast(alreadyVoted ? 'Vote removed' : 'Vote counted!', 'success');
      } catch {
        // Revert localStorage on failure
        if (alreadyVoted) {
          voted.add(docId);
        } else {
          voted.delete(docId);
        }
        saveVotedSet(voted);
        renderVoteList();
        showToast('Vote failed — try again', 'error');
      }
    }

    /* ── Delete food ── */
    async function deleteFood(docId, name) {
      if (!confirm('Delete "' + name + '" from the list?')) return;
      try {
        await foodRef.doc(docId).delete();
        showToast('Deleted!', 'success');
      } catch {
        showToast('Delete failed', 'error');
      }
    }

    /* ═══════════════════════════════════════════
       Random pick (slot-machine style)
       ═══════════════════════════════════════════ */
    const spinActions   = document.getElementById('spinActions');
    const spinRemoveBtn = document.getElementById('spinRemoveBtn');
    const restoreBtn    = document.getElementById('restoreBtn');
    let lastSpinDocId   = null;

    randomBtn.addEventListener('click', () => {
      // Only spin on active (non-removed) items
      const active = foodItems.filter(f => !f.removed);
      if (!active.length) {
        randomResult.textContent = 'No food to spin!';
        return;
      }
      randomBtn.disabled = true;
      spinActions.classList.remove('show');
      randomResult.classList.add('spinning');
      lastSpinDocId = null;
      let ticks = 0;
      const totalTicks = 18 + Math.floor(Math.random() * 8);
      let picked;
      const interval = setInterval(() => {
        picked = active[Math.floor(Math.random() * active.length)];
        randomResult.textContent = picked.text;
        ticks++;
        if (ticks >= totalTicks) {
          clearInterval(interval);
          randomResult.classList.remove('spinning');
          randomResult.textContent = '\uD83C\uDF7D\uFE0F ' + picked.text + ' \uD83C\uDF89';
          lastSpinDocId = picked.id;
          spinActions.classList.add('show');
          randomBtn.disabled = false;
        }
      }, 90);
    });

    // Remove the spun food
    spinRemoveBtn.addEventListener('click', async () => {
      if (!lastSpinDocId) return;
      try {
        await foodRef.doc(lastSpinDocId).update({ removed: true });
        showToast('Removed from list!', 'success');
      } catch {
        showToast('Remove failed', 'error');
      }
      spinActions.classList.remove('show');
      randomResult.textContent = 'Spin again!';
      lastSpinDocId = null;
    });

    // Restore all removed food
    restoreBtn.addEventListener('click', async () => {
      const removed = foodItems.filter(f => f.removed);
      if (!removed.length) return;
      try {
        const batch = db.batch();
        removed.forEach(f => batch.update(foodRef.doc(f.id), { removed: false }));
        await batch.commit();
        showToast('All removed food restored!', 'success');
      } catch {
        showToast('Restore failed', 'error');
      }
    });

    // Show/hide restore button based on whether removed items exist
    function updateRestoreBtn() {
      const hasRemoved = foodItems.some(f => f.removed);
      restoreBtn.classList.toggle('show', hasRemoved);
    }

    /* ═══════════════════════════════════════════
       Real-time listeners
       ═══════════════════════════════════════════ */
    // Bubble answers (gossip, etc.)
    answersRef.orderBy('ts', 'asc').onSnapshot((snapshot) => {
      const now = Date.now();
      const items = [];
      snapshot.forEach((doc) => {
        const d = doc.data();
        if (now - d.ts < SIX_HOURS) {
          items.push({ id: doc.id, text: d.text ?? '', ts: d.ts, image: d.image ?? null, replies: d.replies ?? [] });
        }
      });
      render(items);
    }, (err) => {
      console.error('Firestore error:', err);
      showToast('Connection error — check console (F12)', 'error');
    });

    // Food suggestions (vote & random)
    foodRef.orderBy('ts', 'asc').onSnapshot((snapshot) => {
      foodItems = [];
      snapshot.forEach((doc) => {
        const d = doc.data();
        foodItems.push({ id: doc.id, text: d.text, ts: d.ts, votes: d.votes ?? 0, removed: !!d.removed });
      });
      renderVoteList();
      updateRestoreBtn();
    }, (err) => {
      console.error('Food Firestore error:', err);
    });

    /* ═══════════════════════════════════════════
       Daily vote reset at 12 AM
       ═══════════════════════════════════════════ */
    function getTodayKey() {
      const d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    // On page load: if the stored day differs from today, reset all food votes
    async function dailyReset() {
      const lastDay = localStorage.getItem('food_vote_day') ?? '';
      const today = getTodayKey();
      if (lastDay === today) return;  // same day, nothing to do

      // Clear local vote tracking
      localStorage.removeItem('food_voted');
      localStorage.setItem('food_vote_day', today);

      // Reset votes in Firestore for all food docs
      try {
        const allFood = await foodRef.get();
        if (allFood.empty) return;
        const batch = db.batch();
        allFood.forEach((doc) => {
          if ((doc.data().votes ?? 0) !== 0) {
            batch.update(doc.ref, { votes: 0 });
          }
        });
        await batch.commit();
        resetInfoEl.textContent = '\uD83D\uDD04 Votes reset for today (' + today + ')';
        resetInfoEl.className = 'reset-info just-reset';
      } catch (e) {
        console.error('Daily vote reset failed:', e);
      }
    }
    dailyReset();

    // Show current day info if no reset was needed
    if (!resetInfoEl.textContent) {
      resetInfoEl.textContent = 'Votes reset daily at 12:00 AM';
    }

    // Also schedule a reset if the page stays open past midnight
    function scheduleMidnightReset() {
      const now = new Date();
      const midnight = new Date(now);
      midnight.setHours(24, 0, 0, 0);
      const msUntilMidnight = midnight - now;
      setTimeout(() => {
        dailyReset();
        scheduleMidnightReset();  // schedule next day
      }, msUntilMidnight + 500);  // +500ms buffer
    }
    scheduleMidnightReset();

    /* ── Cleanup: delete expired docs (runs once on each page load) ── */
    (async function cleanup() {
      const expiredCutoff = Date.now() - SIX_HOURS;
      const expired = await answersRef.where('ts', '<=', expiredCutoff).get();
      const batch = db.batch();
      expired.forEach((doc) => batch.delete(doc.ref));
      if (!expired.empty) batch.commit();
    })();
  </script>
</body>
