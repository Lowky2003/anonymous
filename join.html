<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join a Space — Anonymous Bubble Answers</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .join-box {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 40px 32px;
      backdrop-filter: blur(16px);
      text-align: center;
    }
    .join-icon { font-size: 52px; margin-bottom: 16px; }
    h1 {
      font-size: 26px;
      font-weight: 800;
      background: linear-gradient(90deg, #f7c97e, #f2a154);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 32px;
      line-height: 1.6;
    }

    /* Current space banner */
    .current-space {
      background: rgba(90,70,180,0.2);
      border: 1px solid rgba(90,70,180,0.4);
      border-radius: 14px;
      padding: 14px 16px 16px;
      margin-bottom: 24px;
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      display: none;
    }
    .current-space .cs-label { margin-bottom: 4px; }
    .code-badge {
      display: inline-block;
      font-size: 20px;
      font-weight: 800;
      color: #f7c97e;
      letter-spacing: 4px;
      background: rgba(247,201,126,0.08);
      border: 1px solid rgba(247,201,126,0.2);
      border-radius: 8px;
      padding: 4px 14px;
      margin: 6px 0 14px;
    }
    .continue-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #5a46b4, #7c5cbf);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .continue-btn:hover { opacity: 0.85; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: rgba(255,255,255,0.25);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }

    /* Section label */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      text-align: left;
    }

    /* Create button */
    .create-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #3ab0a2, #2d8f83);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .create-btn:hover { opacity: 0.87; }
    .create-btn:active { transform: scale(0.98); }
    .create-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    /* Join row */
    .join-input-row {
      display: flex;
      gap: 8px;
    }
    .code-input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      outline: none;
      transition: border-color 0.2s;
    }
    .code-input::placeholder { color: rgba(255,255,255,0.2); letter-spacing: 1px; font-weight: 400; font-size: 14px; }
    .code-input:focus { border-color: rgba(90,70,180,0.6); }
    .join-btn {
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #f7c97e, #f2a154);
      color: #1a1440;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .join-btn:hover { opacity: 0.85; }
    .join-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* Status */
    .status-msg {
      margin-top: 10px;
      font-size: 13px;
      min-height: 18px;
      text-align: left;
    }
    .status-msg.error  { color: #f87171; }
    .status-msg.success { color: #6ee7b7; }
    .status-msg.loading { color: rgba(255,255,255,0.45); }

    /* Leave link */
    .leave-link {
      display: none;
      margin-top: 28px;
      font-size: 12px;
      color: rgba(255,255,255,0.28);
      cursor: pointer;
      text-decoration: underline;
      background: none;
      border: none;
    }
    .leave-link:hover { color: rgba(255,255,255,0.5); }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 5px;
    }
  </style>
</head>
<body>
  <div class="join-box">
    <div class="join-icon">🌐</div>
    <h1>Anonymous Space</h1>
    <p class="subtitle">Enter a space code to access your group's anonymous board, room, and mini-games. Different codes = completely separate spaces.</p>

    <!-- Shown only when already in a space -->
    <div class="current-space" id="currentSpaceBanner">
      <div class="cs-label">You are currently in space</div>
      <div class="code-badge" id="currentCodeDisplay"></div>
      <button class="continue-btn" id="continueBtn">Continue in this space →</button>
    </div>

    <!-- Create new space -->
    <div class="section-label">Create a new space</div>
    <button class="create-btn" id="createBtn">✨ Generate Space Code</button>

    <div class="divider">or join existing</div>

    <!-- Join existing space -->
    <div class="section-label">Enter space code</div>
    <div class="join-input-row">
      <input
        type="text"
        class="code-input"
        id="codeInput"
        placeholder="e.g. ABC123"
        maxlength="8"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="characters"
        spellcheck="false"
      >
      <button class="join-btn" id="joinBtn">Join</button>
    </div>
    <div class="status-msg" id="statusMsg"></div>

    <button class="leave-link" id="leaveLink">Leave current space</button>
  </div>

  <!-- Firebase SDK (app + firestore only, no auth needed here) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="./src/js/firebase-config.js"></script>
  <script>
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const currentCode     = localStorage.getItem('space_code');
    const banner          = document.getElementById('currentSpaceBanner');
    const currentDisplay  = document.getElementById('currentCodeDisplay');
    const continueBtn     = document.getElementById('continueBtn');
    const leaveLink       = document.getElementById('leaveLink');
    const createBtn       = document.getElementById('createBtn');
    const codeInput       = document.getElementById('codeInput');
    const joinBtn         = document.getElementById('joinBtn');
    const statusMsg       = document.getElementById('statusMsg');

    // ── Show current space if already joined ──────────────────────
    if (currentCode) {
      banner.style.display = 'block';
      currentDisplay.textContent = currentCode;
      leaveLink.style.display = 'inline-block';
    }

    continueBtn.addEventListener('click', () => { window.location.href = 'index.html'; });

    leaveLink.addEventListener('click', () => {
      if (!confirm('Leave space ' + currentCode + '? You can rejoin anytime with the same code.')) return;
      localStorage.removeItem('space_code');
      banner.style.display = 'none';
      leaveLink.style.display = 'none';
      setStatus('', '');
    });

    // ── Helpers ───────────────────────────────────────────────────
    function setStatus(msg, type) {
      statusMsg.textContent = msg;
      statusMsg.className = 'status-msg ' + (type || '');
    }

    function enterSpace(code) {
      localStorage.setItem('space_code', code);
      window.location.href = 'index.html';
    }

    // Force uppercase, remove non-alphanumeric
    codeInput.addEventListener('input', () => {
      codeInput.value = codeInput.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
    });

    // ── Generate random 6-char code (no ambiguous chars) ─────────
    function genCode() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let c = '';
      for (let i = 0; i < 6; i++) c += chars[Math.floor(Math.random() * chars.length)];
      return c;
    }

    // ── Create new space ─────────────────────────────────────────
    createBtn.addEventListener('click', async () => {
      createBtn.disabled = true;
      createBtn.textContent = 'Creating…';
      const code = genCode();
      try {
        await db.collection('spaces').doc(code).set({ createdAt: Date.now() });
      } catch {
        // If Firestore write fails (e.g. security rules), still proceed;
        // the space doc will be created when the first real data is written.
      }
      enterSpace(code);
    });

    // ── Join existing space ───────────────────────────────────────
    async function doJoin() {
      const code = codeInput.value.trim();
      if (code.length < 4) { setStatus('Please enter a valid code (at least 4 characters).', 'error'); return; }
      joinBtn.disabled = true;
      setStatus('Checking…', 'loading');
      try {
        const snap = await db.collection('spaces').doc(code).get();
        if (!snap.exists) {
          setStatus('Space not found. Check the code or create a new one.', 'error');
          joinBtn.disabled = false;
          return;
        }
        enterSpace(code);
      } catch {
        // Network or permission error — join optimistically
        enterSpace(code);
      }
    }

    joinBtn.addEventListener('click', doJoin);
    codeInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doJoin(); });
  </script>
</body>
</html>
