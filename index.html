<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anonymous Bubble Answers</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .page-title {
      text-align: center;
      padding: 36px 20px 6px;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.5px;
      background: linear-gradient(90deg, #c8b6ff, #7ec8e3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .page-subtitle {
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      padding-bottom: 20px;
    }

    /* ── Input area (fixed bottom) ── */
    .input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      gap: 10px;
      padding: 14px 20px;
      background: rgba(15, 12, 41, 0.94);
      backdrop-filter: blur(14px);
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .input-area textarea {
      flex: 1;
      padding: 12px 18px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-size: 15px;
      resize: none;
      height: 48px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-area textarea::placeholder { color: rgba(255,255,255,0.4); }
    .input-area textarea:focus { border-color: rgba(138, 120, 255, 0.6); }

    .input-area button {
      padding: 0 28px;
      border: none;
      border-radius: 24px;
      background: linear-gradient(135deg, #7b5ea7, #5b6abf);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .input-area button:hover { opacity: 0.9; }
    .input-area button:active { transform: scale(0.96); }

    /* ── Attach image button ── */
    .attach-btn {
      width: 48px;
      min-width: 48px;
      height: 48px;
      border: none;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .attach-btn:hover { background: rgba(255,255,255,0.18); }
    .attach-btn:active { transform: scale(0.92); }

    /* ── Image preview strip ── */
    .img-preview-strip {
      display: none;
      position: fixed;
      bottom: 76px;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 8px 20px;
      background: rgba(15, 12, 41, 0.94);
      backdrop-filter: blur(14px);
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .img-preview-strip.show { display: flex; align-items: center; gap: 10px; }
    .img-preview-strip img {
      max-height: 60px;
      max-width: 100px;
      border-radius: 10px;
      object-fit: cover;
    }
    .img-preview-strip .remove-preview {
      background: rgba(224,99,119,0.85);
      border: none;
      color: #fff;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Bubble image ── */
    .bubble-img {
      max-width: 100%;
      border-radius: 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .bubble-img:hover { transform: scale(1.03); }

    /* ── Image lightbox ── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .lightbox.show { display: flex; }
    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 12px;
      object-fit: contain;
    }

    /* ── Bubble reply section ── */
    .bubble-reactions {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 8px;
    }
    .reaction-btn {
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 3px 8px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.12s;
      user-select: none;
    }
    .reaction-btn:hover { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.25); }
    .reaction-btn:active { transform: scale(0.9); }
    .reaction-btn.reacted {
      background: rgba(138, 120, 255, 0.2);
      border-color: rgba(138, 120, 255, 0.5);
    }
    .reaction-btn .r-emoji { font-size: 15px; line-height: 1; }
    .reaction-btn .r-count { font-size: 11px; font-weight: 700; min-width: 8px; text-align: center; }
    .reaction-picker {
      display: flex;
      gap: 2px;
    }
    .reaction-add {
      width: 28px;
      height: 28px;
      border: 1px dashed rgba(255,255,255,0.2);
      border-radius: 12px;
      background: transparent;
      color: rgba(255,255,255,0.35);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    .reaction-add:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .reaction-picker-popup {
      display: none;
      gap: 2px;
      padding: 4px 6px;
      border-radius: 14px;
      background: rgba(30, 25, 70, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .reaction-picker-popup.show { display: flex; }
    .reaction-picker-popup button {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 10px;
      background: transparent;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .reaction-picker-popup button:hover { background: rgba(255,255,255,0.15); }
    .reaction-picker-popup button:active { transform: scale(0.85); }
    .bubble-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }
    .reply-toggle {
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
    }
    .reply-toggle:hover { color: #fff; background: rgba(255,255,255,0.12); }
    .replies-container {
      margin-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.15);
      padding-top: 6px;
    }
    .reply-item {
      font-size: 12.5px;
      padding: 4px 0;
      color: rgba(255,255,255,0.85);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      word-break: break-word;
    }
    .reply-item:last-child { border-bottom: none; }
    .reply-time {
      font-size: 10px;
      opacity: 0.4;
      margin-left: 6px;
    }
    .reply-input-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
    }
    .reply-input-row input {
      flex: 1;
      padding: 5px 10px;
      height: 30px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 12px;
      outline: none;
      box-sizing: border-box;
    }
    .reply-input-row input::placeholder { color: rgba(255,255,255,0.35); }
    .reply-input-row .reply-send-btn {
      padding: 0 10px;
      height: 30px;
      border: none;
      border-radius: 14px;
      background: rgba(255,255,255,0.18);
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      line-height: 30px;
    }
    .reply-input-row .reply-send-btn:hover { background: rgba(255,255,255,0.28); }
    .reply-attach {
      width: 30px;
      min-width: 30px;
      height: 30px;
      border: none;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.6);
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .reply-attach:hover { background: rgba(255,255,255,0.2); }
    .reply-preview {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }
    .reply-preview img {
      max-height: 40px;
      max-width: 60px;
      border-radius: 6px;
      object-fit: cover;
    }
    .reply-preview .remove-reply-img {
      background: rgba(224,99,119,0.8);
      border: none;
      color: #fff;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .reply-img {
      max-width: 100%;
      max-height: 120px;
      border-radius: 8px;
      margin-top: 4px;
      cursor: pointer;
    }
    .reply-img:hover { opacity: 0.85; }

    /* ── Bubble container ── */
    .bubble-wrap {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-content: flex-start;
      gap: 18px;
      padding: 16px 20px 110px;
      min-height: calc(100vh - 130px);
    }

    /* ── Bubble ── */
    .bubble {
      position: relative;
      max-width: 280px;
      min-width: 110px;
      padding: 20px 24px 14px;
      border-radius: 30px;
      color: #fff;
      font-size: 14.5px;
      line-height: 1.6;
      word-break: break-word;
      box-shadow: 0 6px 28px rgba(0,0,0,0.3);
      opacity: 0;
      animation: floatIn 0.5s ease-out forwards,
                 bobbing 5s ease-in-out infinite;
      cursor: default;
      transition: transform 0.2s;
    }
    .bubble:hover { transform: scale(1.06); }

    .bubble .timer {
      display: block;
      margin-top: 10px;
      font-size: 11px;
      opacity: 0.5;
      text-align: right;
    }

    /* 8 colour variants */
    .bubble.c0 { background: linear-gradient(135deg, #7b5ea7cc, #5b6abfcc); }
    .bubble.c1 { background: linear-gradient(135deg, #e06377cc, #f0939bcc); }
    .bubble.c2 { background: linear-gradient(135deg, #3ab0a2cc, #58c5b5cc); }
    .bubble.c3 { background: linear-gradient(135deg, #f2a154cc, #f7c97ecc); }
    .bubble.c4 { background: linear-gradient(135deg, #6886c5cc, #8ea8dbcc); }
    .bubble.c5 { background: linear-gradient(135deg, #c06c84cc, #f67280cc); }
    .bubble.c6 { background: linear-gradient(135deg, #45b7a0cc, #61d4b3cc); }
    .bubble.c7 { background: linear-gradient(135deg, #9b72cfcc, #c49bdbcc); }

    @keyframes floatIn {
      from { opacity: 0; transform: translateY(30px) scale(0.8); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes bobbing {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }

    /* ── Empty state ── */
    .empty-state {
      width: 100%;
      text-align: center;
      color: rgba(255,255,255,0.28);
      font-size: 17px;
      margin-top: 100px;
    }
    .empty-state .icon { font-size: 56px; display: block; margin-bottom: 14px; }

    /* ── Toast notification ── */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      padding: 12px 26px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 500;
      z-index: 200;
      transition: transform 0.35s ease;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: rgba(58,176,162,0.93); color: #fff; }
    .toast.error   { background: rgba(224,99,119,0.93); color: #fff; }

    /* ── Sidebar toggle button ── */
    .sidebar-toggle {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 310;
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 12px;
      background: rgba(123, 94, 167, 0.85);
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.15s;
      backdrop-filter: blur(8px);
    }
    .sidebar-toggle:hover { background: rgba(123, 94, 167, 1); }
    .sidebar-toggle:active { transform: scale(0.92); }

    /* ── Notification bell ── */
    .notif-bell {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 310;
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 12px;
      background: rgba(123, 94, 167, 0.85);
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.15s;
      backdrop-filter: blur(8px);
    }
    .notif-bell:hover { background: rgba(123, 94, 167, 1); }
    .notif-bell:active { transform: scale(0.92); }
    .notif-bell.enabled { background: rgba(58, 176, 162, 0.85); }
    .notif-bell.enabled:hover { background: rgba(58, 176, 162, 1); }
    .notif-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 9px;
      background: #e06377;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      line-height: 18px;
      text-align: center;
      display: none;
    }
    .notif-badge.show { display: block; }
    @keyframes bellShake {
      0%, 100% { transform: rotate(0); }
      20% { transform: rotate(14deg); }
      40% { transform: rotate(-14deg); }
      60% { transform: rotate(8deg); }
      80% { transform: rotate(-8deg); }
    }
    .notif-bell.ring .bell-icon { animation: bellShake 0.5s ease; }

    /* ── Left sidebar ── */
    .sidebar {
      position: fixed;
      top: 0;
      left: -320px;
      width: 300px;
      height: 100vh;
      height: 100dvh;
      z-index: 300;
      background: rgba(20, 17, 50, 0.97);
      backdrop-filter: blur(18px);
      border-right: 1px solid rgba(255,255,255,0.08);
      transition: left 0.3s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar.open { left: 0; }
    .sidebar-body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .sidebar-overlay {
      position: fixed;
      inset: 0;
      z-index: 290;
      background: rgba(0,0,0,0.45);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .sidebar-overlay.show { opacity: 1; pointer-events: auto; touch-action: none; }
    body.sidebar-open { overflow: hidden; touch-action: none; }

    .sidebar-header {
      padding: 22px 20px 10px 60px;
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(90deg, #c8b6ff, #7ec8e3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .sidebar-section {
      padding: 16px 18px;
      flex-shrink: 0;
    }
    .sidebar-section h3 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 12px;
    }

    /* ── Random pick ── */
    .random-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, #f2a154, #f7c97e);
      color: #1a1a2e;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      margin-bottom: 10px;
    }
    .random-btn:hover { opacity: 0.9; }
    .random-btn:active { transform: scale(0.96); }

    .random-result {
      text-align: center;
      padding: 18px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.06);
      font-size: 18px;
      font-weight: 600;
      color: #f7c97e;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      word-break: break-word;
      line-height: 1.4;
    }
    .random-result.spinning {
      animation: slotSpin 0.1s linear infinite;
    }
    @keyframes slotSpin {
      0%   { opacity: 1; }
      50%  { opacity: 0.5; }
      100% { opacity: 1; }
    }

    /* ── Spin action buttons ── */
    .spin-actions {
      display: none;
      gap: 8px;
      margin-top: 10px;
    }
    .spin-actions.show { display: flex; }
    .spin-actions button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.12s;
    }
    .spin-actions button:hover { opacity: 0.9; }
    .spin-actions button:active { transform: scale(0.94); }
    .spin-actions .remove-btn {
      background: linear-gradient(135deg, #e06377, #f0939b);
      color: #fff;
    }

    /* ── Restore removed ── */
    .restore-btn {
      width: 100%;
      padding: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      background: transparent;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      cursor: pointer;
      margin-top: 10px;
      transition: color 0.2s, border-color 0.2s;
      display: none;
    }
    .restore-btn.show { display: block; }
    .restore-btn:hover { color: #fff; border-color: rgba(255,255,255,0.3); }

    /* ── Vote list ── */
    .vote-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .vote-item {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      transition: background 0.2s;
      min-height: 52px;
    }
    .vote-item:hover { background: rgba(255,255,255,0.1); }
    .vote-item .vote-text {
      flex: 1;
      font-size: 14px;
      color: rgba(255,255,255,0.85);
      word-break: break-word;
    }
    .vote-item .vote-count {
      font-size: 13px;
      font-weight: 700;
      color: #c8b6ff;
      min-width: 24px;
      text-align: center;
    }
    .vote-item .vote-btn {
      border: none;
      border-radius: 10px;
      width: 42px;
      height: 42px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.12s;
      background: rgba(123, 94, 167, 0.4);
      color: #fff;
    }
    .vote-item .vote-btn:hover { background: rgba(123, 94, 167, 0.7); }
    .vote-item .vote-btn:active { transform: scale(0.88); }
    .vote-item .vote-btn.voted {
      background: rgba(123, 94, 167, 0.85);
      color: #f7c97e;
    }
    .vote-item .vote-actions {
      display: flex;
      gap: 4px;
    }
    .vote-item .vote-action {
      border: none;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.12s;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.5);
    }
    .vote-item .vote-action:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .vote-item .vote-action:active { transform: scale(0.88); }
    .vote-item .vote-action.del:hover { background: rgba(224,99,119,0.4); }
    .vote-empty {
      text-align: center;
      color: rgba(255,255,255,0.25);
      font-size: 13px;
      padding: 20px 0;
    }
    .reset-info {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      text-align: center;
      padding: 6px 0 10px;
      letter-spacing: 0.3px;
    }
    .reset-info.just-reset {
      color: #58c5b5;
    }

    /* ── Food input row ── */
    .food-input-row {
      display: flex;
      gap: 8px;
    }
    .food-input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .food-input-row input::placeholder { color: rgba(255,255,255,0.35); }
    .food-input-row input:focus { border-color: rgba(138, 120, 255, 0.6); }
    .food-input-row button {
      width: 42px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #3ab0a2, #58c5b5);
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.12s;
    }
    .food-input-row button:hover { opacity: 0.9; }
    .food-input-row button:active { transform: scale(0.9); }

    /* ── Countdown timer ── */
    .countdown-display {
      text-align: center;
      padding: 18px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.06);
      margin-top: 10px;
    }
    .countdown-digits {
      font-size: 32px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #c8b6ff, #7ec8e3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.3;
    }
    .countdown-label {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      margin-top: 4px;
      letter-spacing: 0.5px;
    }
    .countdown-done {
      font-size: 28px;
      animation: cdPulse 0.6s ease-in-out infinite alternate;
    }
    @keyframes cdPulse {
      from { transform: scale(1); }
      to   { transform: scale(1.12); }
    }
    .countdown-input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .countdown-input-row input[type="time"] {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      color-scheme: dark;
    }
    .countdown-input-row input[type="time"]:focus {
      border-color: rgba(138, 120, 255, 0.6);
    }
    .countdown-input-row button {
      padding: 10px 16px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #7b5ea7, #5b6abf);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.12s;
      white-space: nowrap;
    }
    .countdown-input-row button:hover { opacity: 0.9; }
    .countdown-input-row button:active { transform: scale(0.94); }
    .countdown-clear {
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      background: transparent;
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .countdown-clear:hover { color: #fff; border-color: rgba(255,255,255,0.25); }
    .countdown-schedule {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      text-align: center;
      margin-top: 6px;
    }

    /* ── Celebration overlay ── */
    .celebration-overlay {
      position: fixed;
      inset: 0;
      z-index: 600;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(15, 12, 41, 0.92);
      backdrop-filter: blur(12px);
    }
    .celebration-overlay.show { display: flex; }
    .celebration-text {
      font-size: 48px;
      font-weight: 900;
      text-align: center;
      background: linear-gradient(90deg, #f7c97e, #f2a154, #e06377, #c8b6ff, #7ec8e3);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: celebrate-gradient 2s ease infinite;
      line-height: 1.3;
    }
    .celebration-sub {
      font-size: 20px;
      color: rgba(255,255,255,0.7);
      margin-top: 12px;
    }
    .celebration-emojis {
      font-size: 60px;
      margin-top: 20px;
      animation: celebrate-bounce 0.8s ease-in-out infinite alternate;
    }
    @keyframes celebrate-gradient {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes celebrate-bounce {
      from { transform: translateY(0) scale(1); }
      to   { transform: translateY(-18px) scale(1.1); }
    }
    .celebration-close {
      margin-top: 36px;
      padding: 14px 36px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 16px;
      background: transparent;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .celebration-close:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.5);
    }
    /* confetti particles */
    .confetti {
      position: fixed;
      z-index: 601;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      pointer-events: none;
      animation: confetti-fall linear forwards;
    }
    @keyframes confetti-fall {
      0%   { opacity: 1; transform: translateY(-10vh) rotate(0deg); }
      100% { opacity: 0; transform: translateY(110vh) rotate(720deg); }
    }

    /* ── Main content offset when sidebar open (desktop) ── */
    body.sidebar-open .page-title,
    body.sidebar-open .page-subtitle,
    body.sidebar-open .bubble-wrap {
      margin-left: 300px;
      transition: margin-left 0.3s ease;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .page-title { font-size: 22px; }
      .bubble { max-width: 90vw; font-size: 14px; padding: 16px 18px 12px; }
      .input-area { padding: 10px 12px; }
      .img-preview-strip { bottom: 68px; padding: 6px 12px; }
      .sidebar { width: 85vw; left: -85vw; }
      body.sidebar-open .page-title,
      body.sidebar-open .page-subtitle,
      body.sidebar-open .bubble-wrap { margin-left: 0; }

      .vote-item { padding: 8px 10px; gap: 5px; }
      .vote-item .vote-text { font-size: 13px; }
      .vote-item .vote-btn { width: 32px; height: 32px; font-size: 14px; }
      .vote-item .vote-action { width: 32px; height: 32px; font-size: 13px; }

      .reply-input-row input { font-size: 14px; padding: 5px 10px; height: 34px; }
      .reply-input-row .reply-send-btn { font-size: 14px; height: 34px; line-height: 34px; }
      .reply-attach { width: 34px; min-width: 34px; height: 34px; }
      .reply-item { font-size: 13px; }
      .attach-btn { width: 42px; min-width: 42px; height: 42px; font-size: 18px; }
    }
  </style>
</head>
<body>

  <!-- Sidebar toggle -->
  <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle menu">&#9776;</button>

  <!-- Notification bell -->
  <button class="notif-bell" id="notifBell" title="Toggle notifications">
    <span class="bell-icon">🔔</span>
    <span class="notif-badge" id="notifBadge">0</span>
  </button>

  <!-- Overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Left sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">What to Eat?</div>

    <div class="sidebar-body">

    <!-- Countdown timer -->
    <div class="sidebar-section">
      <h3>&#9203; Countdown to Off Work</h3>
      <div class="countdown-input-row">
        <input type="time" id="countdownTime" value="18:00">
        <button id="countdownSetBtn">Set</button>
      </div>
      <div class="countdown-display" id="countdownDisplay">
        <div class="countdown-digits" id="countdownDigits">--:--:--</div>
        <div class="countdown-label" id="countdownLabel">Loading…</div>
      </div>
      <button class="countdown-clear" id="countdownClear">&#128260; Clear countdown</button>

    <div class="sidebar-section">

      </div>

    <!-- Random pick section -->
    <div class="sidebar-section">
      <h3>&#127922; Random Pick</h3>
      <button class="random-btn" id="randomBtn">Spin &amp; Decide!</button>
      <div class="random-result" id="randomResult">Press the button!</div>
      <div class="spin-actions" id="spinActions">
        <button class="remove-btn" id="spinRemoveBtn">&#10060; Remove from spin</button>

    </div>

    <!-- Vote section -->
    <div class="sidebar-section">
      <h3>&#128077; Vote for Food</h3>

        <li class="vote-empty">No suggestions yet</li>
      </ul>
    </div>
    </div><!-- end sidebar-body -->
  </aside>

  <h1 class="page-title">Anonymous Bubble Answers</h1>
  <p class="page-subtitle">Answers disappear after 6 hours &#8987;</p>

  <div class="bubble-wrap" id="bubbleWrap"></div>

  <div class="img-preview-strip" id="imgPreviewStrip">
    <img id="imgPreviewThumb" src="" alt="preview">
    <button class="remove-preview" id="removePreview" title="Remove image">✕</button>
  </div>

  <div class="input-area">
    <button class="attach-btn" id="attachBtn" title="Attach image">📷</button>
    <input type="file" id="imageInput" accept="image/*" style="display:none">
    <textarea id="answerInput" placeholder="Type your anonymous answer…" maxlength="500"></textarea>
    <button id="sendBtn">Send</button>
  </div>

  <div class="lightbox" id="lightbox"><img id="lightboxImg" src="" alt="full"></div>

  <div class="toast" id="toast"></div>

  <!-- Celebration overlay -->
  <div class="celebration-overlay" id="celebrationOverlay">
    <div class="celebration-emojis">🎉🥳🎊</div>
    <div class="celebration-text">OFF WORK!</div>
    <div class="celebration-sub">Time to go home! You did great today 💪</div>
    <button class="celebration-close" id="celebrationClose">Dismiss</button>
  </div>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    /* ═══════════════════════════════════════════
       Firebase config loaded from firebase-config.js
       ═══════════════════════════════════════════ */

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    // Enable Firestore offline persistence (IndexedDB cache)
    db.enablePersistence({ synchronizeTabs: true }).catch((err) => {
      if (err.code === 'failed-precondition') {
        console.warn('Firestore persistence unavailable: multiple tabs open');
      } else if (err.code === 'unimplemented') {
        console.warn('Firestore persistence not supported in this browser');
      }
    });
    const answersRef = db.collection('answers');
    const foodRef    = db.collection('food_suggestions');
    const spinResultRef = db.doc('app_state/spin_result');

    const SIX_HOURS = 6 * 60 * 60 * 1000;
    const COLORS = 8;

    const wrap = document.getElementById('bubbleWrap');
    const input = document.getElementById('answerInput');
    const sendBtn = document.getElementById('sendBtn');
    const toastEl = document.getElementById('toast');
    const attachBtn = document.getElementById('attachBtn');
    const imageInput = document.getElementById('imageInput');
    const imgPreviewStrip = document.getElementById('imgPreviewStrip');
    const imgPreviewThumb = document.getElementById('imgPreviewThumb');
    const removePreview = document.getElementById('removePreview');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    let toastTimer = null;
    let pendingImage = null;  // base64 string of compressed image
    let suppressNextNotif = false; // suppress notification for self-sent messages

    /* ── Local cache helpers ── */
    function cacheSet(key, data) {
      try { localStorage.setItem(key, JSON.stringify(data)); } catch {}
    }
    function cacheGet(key) {
      try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch { return null; }
    }

    /* ── Helpers ── */
    function showToast(msg, type) {
      toastEl.textContent = msg;
      toastEl.className = 'toast ' + type + ' show';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2400);
    }

    function fmtRemaining(ms) {
      if (ms <= 0) return 'expiring…';
      const h = Math.floor(ms / 3600000);
      const m = Math.floor((ms % 3600000) / 60000);
      return h > 0 ? h + 'h ' + m + 'm left' : m + 'm left';
    }

    /* ── Emoji reactions ── */
    const REACTION_EMOJIS = ['👍', '❤️', '😂', '😮', '😢', '🔥'];

    // Track which reactions this browser has toggled: { docId: Set(['👍', ...]) }
    function getMyReactions(docId) {
      try {
        const all = JSON.parse(localStorage.getItem('my_reactions') || '{}');
        return new Set(all[docId] || []);
      } catch { return new Set(); }
    }
    function saveMyReaction(docId, emoji, added) {
      try {
        const all = JSON.parse(localStorage.getItem('my_reactions') || '{}');
        if (!all[docId]) all[docId] = [];
        const set = new Set(all[docId]);
        if (added) set.add(emoji); else set.delete(emoji);
        all[docId] = [...set];
        localStorage.setItem('my_reactions', JSON.stringify(all));
      } catch {}
    }

    async function toggleReaction(docId, emoji) {
      const mine = getMyReactions(docId);
      const removing = mine.has(emoji);
      // Optimistic local update
      saveMyReaction(docId, emoji, !removing);
      try {
        const key = 'reactions.' + emoji;
        await answersRef.doc(docId).update({
          [key]: firebase.firestore.FieldValue.increment(removing ? -1 : 1)
        });
      } catch {
        // Revert on failure
        saveMyReaction(docId, emoji, removing);
        showToast('Reaction failed', 'error');
      }
    }

    function buildReactionsRow(a) {
      const row = document.createElement('div');
      row.className = 'bubble-reactions';
      const mine = getMyReactions(a.id);

      // Show emojis that have counts > 0
      REACTION_EMOJIS.forEach(emoji => {
        const count = Math.max(0, (a.reactions && a.reactions[emoji]) || 0);
        if (count > 0 || mine.has(emoji)) {
          const btn = document.createElement('button');
          btn.className = 'reaction-btn' + (mine.has(emoji) ? ' reacted' : '');
          btn.innerHTML = '<span class="r-emoji">' + emoji + '</span><span class="r-count">' + (count || '') + '</span>';
          btn.addEventListener('click', (e) => { e.stopPropagation(); toggleReaction(a.id, emoji); });
          row.appendChild(btn);
        }
      });

      // "+" button to pick a new emoji
      const pickerWrap = document.createElement('div');
      pickerWrap.className = 'reaction-picker';
      const addBtn = document.createElement('button');
      addBtn.className = 'reaction-add';
      addBtn.textContent = '+';
      addBtn.title = 'React';

      const popup = document.createElement('div');
      popup.className = 'reaction-picker-popup';
      REACTION_EMOJIS.forEach(emoji => {
        const btn = document.createElement('button');
        btn.textContent = emoji;
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          popup.classList.remove('show');
          toggleReaction(a.id, emoji);
        });
        popup.appendChild(btn);
      });

      addBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        popup.classList.toggle('show');
      });

      // Close picker when clicking elsewhere
      document.addEventListener('click', () => popup.classList.remove('show'));

      pickerWrap.appendChild(addBtn);
      pickerWrap.appendChild(popup);
      row.appendChild(pickerWrap);

      return row;
    }

    function updateReactions(bubble, a) {
      const oldRow = bubble.querySelector('.bubble-reactions');
      if (!oldRow) return;
      const newRow = buildReactionsRow(a);
      oldRow.replaceWith(newRow);
    }

    /* ── Image compression ── */
    function compressImage(file, maxW, maxH, quality) {
      maxW = maxW || 400;
      maxH = maxH || 400;
      quality = quality || 0.5;
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            let w = img.width, h = img.height;
            if (w > maxW || h > maxH) {
              const ratio = Math.min(maxW / w, maxH / h);
              w = Math.round(w * ratio);
              h = Math.round(h * ratio);
            }
            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    /* ── Attach image handlers ── */
    attachBtn.addEventListener('click', () => imageInput.click());
    imageInput.addEventListener('change', async () => {
      const file = imageInput.files[0];
      if (!file) return;
      try {
        pendingImage = await compressImage(file);
        imgPreviewThumb.src = pendingImage;
        imgPreviewStrip.classList.add('show');
      } catch {
        showToast('Failed to load image', 'error');
      }
      imageInput.value = '';
    });
    removePreview.addEventListener('click', () => {
      pendingImage = null;
      imgPreviewStrip.classList.remove('show');
    });

    /* ── Paste image from clipboard ── */
    input.addEventListener('paste', async (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          e.preventDefault();
          const file = item.getAsFile();
          if (!file) return;
          try {
            pendingImage = await compressImage(file);
            imgPreviewThumb.src = pendingImage;
            imgPreviewStrip.classList.add('show');
          } catch {
            showToast('Failed to load pasted image', 'error');
          }
          return;
        }
      }
    });

    /* ── Lightbox ── */
    lightbox.addEventListener('click', () => lightbox.classList.remove('show'));

    /* ── Render bubbles ── */
    let knownIds = new Set();

    function render(items) {
      if (!items.length) {
        wrap.innerHTML =
          '<div class="empty-state"><span class="icon">💬</span>No answers yet — be the first!</div>';
        knownIds.clear();
        return;
      }

      const newIds = new Set(items.map(a => a.id));
      // Remove bubbles that no longer exist
      wrap.querySelectorAll('.bubble').forEach(el => {
        if (!newIds.has(el.dataset.id)) el.remove();
      });

      const now = Date.now();
      items.forEach((a, i) => {
        const existing = wrap.querySelector('[data-id="' + a.id + '"]');
        if (existing) {
          // Update timer, replies, and reactions
          const timer = existing.querySelector('.bubble-footer .timer');
          if (timer) timer.textContent = fmtRemaining(SIX_HOURS - (now - a.ts));
          updateReplies(existing, a);
          updateReactions(existing, a);
          return;
        }
        // New bubble — animate in
        const bubble = document.createElement('div');
        bubble.className = 'bubble c' + (i % COLORS);
        bubble.dataset.id = a.id;
        bubble.style.animationDelay = '0s, 0s';

        if (a.image) {
          const img = document.createElement('img');
          img.className = 'bubble-img';
          img.src = a.image;
          img.alt = 'image';
          img.addEventListener('click', (e) => {
            e.stopPropagation();
            lightboxImg.src = a.image;
            lightbox.classList.add('show');
          });
          bubble.appendChild(img);
        }

        const txt = document.createElement('span');
        txt.textContent = a.text;
        bubble.appendChild(txt);

        // Reactions row
        const reactionsRow = buildReactionsRow(a);
        bubble.appendChild(reactionsRow);

        const footer = document.createElement('div');
        footer.className = 'bubble-footer';

        const replyBtn = document.createElement('button');
        replyBtn.className = 'reply-toggle';
        replyBtn.textContent = '💬 Reply' + (a.replies.length ? ' (' + a.replies.length + ')' : '');
        // Store latest data on bubble for reply toggling
        bubble._replyData = a;
        replyBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          const container = bubble.querySelector('.replies-container');
          const latest = bubble._replyData || a;
          if (container) {
            container.remove();
            replyBtn.textContent = '💬 Reply' + (latest.replies.length ? ' (' + latest.replies.length + ')' : '');
          } else {
            openReplies(bubble, latest);
          }
        });
        footer.appendChild(replyBtn);

        const timer = document.createElement('span');
        timer.className = 'timer';
        timer.textContent = fmtRemaining(SIX_HOURS - (now - a.ts));
        footer.appendChild(timer);

        bubble.appendChild(footer);

        wrap.appendChild(bubble);
      });
      knownIds = newIds;
    }

    /* ── Reply helpers ── */
    function fmtReplyTime(ts) {
      const d = new Date(ts);
      return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
    }

    function updateReplies(bubble, a) {
      // Always keep latest data on bubble so reopen works
      bubble._replyData = a;
      const container = bubble.querySelector('.replies-container');
      if (!container) {
        // Update reply count on the toggle button
        const btn = bubble.querySelector('.reply-toggle');
        if (btn) btn.textContent = '💬 Reply' + (a.replies.length ? ' (' + a.replies.length + ')' : '');
        return;
      }
      // Re-render replies inside open container
      const inputRow = container.querySelector('.reply-input-row');
      container.innerHTML = '';
      a.replies.forEach(r => {
        container.appendChild(buildReplyItem(r));
      });
      // Re-add input row
      container.appendChild(buildReplyInput(a.id));
      // Update button count
      const btn = bubble.querySelector('.reply-toggle');
      if (btn) btn.textContent = '💬 Reply (' + a.replies.length + ')';
    }

    function openReplies(bubble, a) {
      let container = bubble.querySelector('.replies-container');
      if (container) container.remove();
      container = document.createElement('div');
      container.className = 'replies-container';
      a.replies.forEach(r => {
        container.appendChild(buildReplyItem(r));
      });
      container.appendChild(buildReplyInput(a.id));
      bubble.appendChild(container);
    }

    function buildReplyItem(r) {
      const div = document.createElement('div');
      div.className = 'reply-item';
      if (r.image) {
        const img = document.createElement('img');
        img.className = 'reply-img';
        img.src = r.image;
        img.alt = 'reply image';
        img.addEventListener('click', (e) => {
          e.stopPropagation();
          lightboxImg.src = r.image;
          lightbox.classList.add('show');
        });
        div.appendChild(img);
      }
      if (r.text) {
        const txt = document.createElement('span');
        txt.textContent = r.text;
        div.appendChild(txt);
      }
      const time = document.createElement('span');
      time.className = 'reply-time';
      time.textContent = fmtReplyTime(r.ts);
      div.appendChild(time);
      return div;
    }

    function buildReplyInput(docId) {
      const wrapper = document.createElement('div');
      const row = document.createElement('div');
      row.className = 'reply-input-row';
      let replyPendingImage = null;

      // Attach button
      const attachBtn = document.createElement('button');
      attachBtn.className = 'reply-attach';
      attachBtn.textContent = '📷';
      attachBtn.title = 'Attach image';
      const fileInput = document.createElement('input');
      fileInput.type = 'file';
      fileInput.accept = 'image/*';
      fileInput.style.display = 'none';
      attachBtn.addEventListener('click', (e) => { e.stopPropagation(); fileInput.click(); });

      // Preview area
      const preview = document.createElement('div');
      preview.className = 'reply-preview';
      preview.style.display = 'none';
      const previewImg = document.createElement('img');
      const removeBtn = document.createElement('button');
      removeBtn.className = 'remove-reply-img';
      removeBtn.textContent = '✕';
      removeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        replyPendingImage = null;
        preview.style.display = 'none';
      });
      preview.appendChild(previewImg);
      preview.appendChild(removeBtn);

      fileInput.addEventListener('change', async () => {
        const file = fileInput.files[0];
        if (!file) return;
        try {
          replyPendingImage = await compressImage(file);
          previewImg.src = replyPendingImage;
          preview.style.display = 'flex';
        } catch {
          showToast('Failed to load image', 'error');
        }
        fileInput.value = '';
      });

      const inp = document.createElement('input');
      inp.type = 'text';
      inp.placeholder = 'Write a reply…';
      inp.maxLength = 300;

      // Paste image into reply
      inp.addEventListener('paste', async (e) => {
        const items = e.clipboardData?.items;
        if (!items) return;
        for (const item of items) {
          if (item.type.startsWith('image/')) {
            e.preventDefault();
            const file = item.getAsFile();
            if (!file) return;
            try {
              replyPendingImage = await compressImage(file);
              previewImg.src = replyPendingImage;
              preview.style.display = 'flex';
            } catch {
              showToast('Failed to load pasted image', 'error');
            }
            return;
          }
        }
      });

      const btn = document.createElement('button');
      btn.className = 'reply-send-btn';
      btn.textContent = '➤';
      const doSend = async () => {
        const text = inp.value.trim();
        if (!text && !replyPendingImage) return;
        btn.disabled = true;
        try {
          const reply = { ts: Date.now() };
          if (text) reply.text = text;
          if (replyPendingImage) reply.image = replyPendingImage;
          await answersRef.doc(docId).update({
            replies: firebase.firestore.FieldValue.arrayUnion(reply)
          });
          inp.value = '';
          replyPendingImage = null;
          preview.style.display = 'none';
        } catch {
          showToast('Reply failed', 'error');
        } finally {
          btn.disabled = false;
        }
      };
      btn.addEventListener('click', (e) => { e.stopPropagation(); doSend(); });
      inp.addEventListener('keydown', (e) => {
        e.stopPropagation();
        if (e.key === 'Enter') { e.preventDefault(); doSend(); }
      });
      inp.addEventListener('click', (e) => e.stopPropagation());
      row.appendChild(fileInput);
      row.appendChild(attachBtn);
      row.appendChild(inp);
      row.appendChild(btn);
      wrapper.appendChild(row);
      wrapper.appendChild(preview);
      return wrapper;
    }

    /* ── (Bubble real-time listener is below, after sidebar setup) ── */

    /* ── Submit answer to Firestore ── */
    async function submit() {
      const text = input.value.trim();
      if (!text && !pendingImage) return;
      if (text.length > 500) {
        showToast('Max 500 characters', 'error');
        return;
      }

      sendBtn.disabled = true;
      try {
        const doc = { ts: Date.now() };
        if (text) doc.text = text;
        if (pendingImage) doc.image = pendingImage;
        suppressNextNotif = true;
        const docRef = await answersRef.add(doc);
        input.value = '';

        imgPreviewStrip.classList.remove('show');
        showToast('Answer sent!', 'success');
      } catch {
        showToast('Failed to send — try again', 'error');
      } finally {
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener('click', submit);
    input.addEventListener('keydown', (e) => {

    const voteListEl   = document.getElementById('voteList');

    // Track which food docs this browser already voted on
    function getVotedSet() {
      try {
        return new Set(JSON.parse(localStorage.getItem('food_voted') ?? '[]'));
      } catch { return new Set(); }
    }
    function saveVotedSet(set) {
      localStorage.setItem('food_voted', JSON.stringify([...set]));

    let foodItems = [];   // kept in sync by the food onSnapshot listener

    /* ── Add food suggestion ── */
    async function addFood() {
      const text = foodInput.value.trim();
      if (!text) return;
      if (text.length > 100) {
        showToast('Max 100 characters', 'error');
        return;
      }
      addFoodBtn.disabled = true;

        await foodRef.add({ text, ts: Date.now(), votes: 0 });
        foodInput.value = '';
        showToast('Food added!', 'success');

    /* ── Render vote list ── */
    function renderVoteList() {
      const voted = getVotedSet();
      const activeFood = foodItems.filter(f => !f.removed);
      if (!activeFood.length) {
        voteListEl.innerHTML = '<li class="vote-empty">No suggestions yet</li>';
        return;
      }

      const sorted = [...activeFood].sort((a, b) => (b.votes ?? 0) - (a.votes ?? 0));
      voteListEl.innerHTML = '';
      sorted.forEach((item) => {
        const li = document.createElement('li');
        li.className = 'vote-item';

        const txt = document.createElement('span');
        txt.className = 'vote-text';
        txt.textContent = item.text;

        const count = document.createElement('span');
        count.className = 'vote-count';
        count.textContent = Math.max(0, item.votes ?? 0);

        const btn = document.createElement('button');
        btn.className = 'vote-btn' + (voted.has(item.id) ? ' voted' : '');
        btn.innerHTML = voted.has(item.id) ? '&#9989;' : '&#128077;';
        btn.addEventListener('click', () => castVote(item.id));

        const actions = document.createElement('div');
        actions.className = 'vote-actions';

        const delBtn = document.createElement('button');
        delBtn.className = 'vote-action del';
        delBtn.innerHTML = '&#128465;';
        delBtn.title = 'Delete';
        delBtn.addEventListener('click', () => deleteFood(item.id, item.text));

        actions.append(delBtn);
        li.append(txt, count, btn, actions);
        voteListEl.appendChild(li);
      });
    }

    async function castVote(docId) {
      const voted = getVotedSet();
      const alreadyVoted = voted.has(docId);

      // If "undoing" but Firestore votes is already 0, just clear local state
      if (alreadyVoted) {
        const item = foodItems.find(f => f.id === docId);
        if (item && (item.votes ?? 0) <= 0) {
          voted.delete(docId);
          saveVotedSet(voted);
          renderVoteList();
          return;
        }
      }

      // Update localStorage FIRST so onSnapshot render picks up the new state
      if (alreadyVoted) {
        voted.delete(docId);
      } else {
        voted.add(docId);
      }
      saveVotedSet(voted);
      renderVoteList();

      try {
        await foodRef.doc(docId).update({
          votes: firebase.firestore.FieldValue.increment(alreadyVoted ? -1 : 1)
        });
        showToast(alreadyVoted ? 'Vote removed' : 'Vote counted!', 'success');
      } catch {
        // Revert localStorage on failure
        if (alreadyVoted) {
          voted.add(docId);
        } else {
          voted.delete(docId);
        }
        saveVotedSet(voted);
        renderVoteList();
        showToast('Vote failed — try again', 'error');
      }
    }

      let ticks = 0;

      const interval = setInterval(() => {

          randomResult.textContent = '\uD83C\uDF7D\uFE0F ' + picked.text + ' \uD83C\uDF89';
          lastSpinDocId = picked.id;
          spinActions.classList.add('show');
          randomBtn.disabled = false;
          // Sync result to Firestore so all users see it

    /* ═══════════════════════════════════════════
       Notifications — browser push + tab badge
       ═══════════════════════════════════════════ */
    const notifBell  = document.getElementById('notifBell');
    const notifBadge = document.getElementById('notifBadge');
    const originalTitle = document.title;
    let notifEnabled = localStorage.getItem('notif_enabled') === '1';
    let isFirstSnapshot = true;
    let unseenCount = 0;
    let titleFlashInterval = null;

    // Notification sound using Web Audio API (no external file needed)
    let audioCtx = null;
    function ensureAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      // Resume if suspended (mobile browsers suspend until user gesture)
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }
    function playNotifSound() {
      try {
        const ctx = ensureAudioCtx();
        // Two-tone chime: boop-boop
        [0, 0.15].forEach((delay, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = 'sine';
          osc.frequency.value = i === 0 ? 660 : 880; // two rising notes
          gain.gain.setValueAtTime(0.18, ctx.currentTime + delay);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.25);
          osc.start(ctx.currentTime + delay);
          osc.stop(ctx.currentTime + delay + 0.25);
        });
      } catch {}
    }

    // Unlock audio context on first user interaction (required on mobile)
    function unlockAudio() {
      ensureAudioCtx();
      document.removeEventListener('touchstart', unlockAudio);
      document.removeEventListener('click', unlockAudio);
    }
    document.addEventListener('touchstart', unlockAudio, { once: true });
    document.addEventListener('click', unlockAudio, { once: true });

    function updateBellUI() {
      notifBell.classList.toggle('enabled', notifEnabled);
      notifBell.title = notifEnabled ? 'Notifications ON — click to turn off' : 'Notifications OFF — click to turn on';
    }
    updateBellUI();

    notifBell.addEventListener('click', async () => {
      if (!notifEnabled) {
        // Request permission
        if ('Notification' in window && Notification.permission === 'default') {
          const perm = await Notification.requestPermission();
          if (perm !== 'granted') {
            showToast('Notifications blocked by browser', 'error');
            return;
          }
        }
        if ('Notification' in window && Notification.permission === 'denied') {
          showToast('Notifications blocked — enable in browser settings', 'error');
          return;
        }
        notifEnabled = true;
        localStorage.setItem('notif_enabled', '1');
        showToast('Notifications enabled! 🔔', 'success');
      } else {
        notifEnabled = false;
        localStorage.setItem('notif_enabled', '0');
        showToast('Notifications disabled', 'success');
      }
      updateBellUI();
    });

    // Clear badge when user focuses the tab
    window.addEventListener('focus', () => {
      unseenCount = 0;
      notifBadge.classList.remove('show');
      document.title = originalTitle;
      clearInterval(titleFlashInterval);
      titleFlashInterval = null;
    });

    function ringBell() {
      notifBell.classList.remove('ring');
      void notifBell.offsetWidth; // force reflow
      notifBell.classList.add('ring');
    }

    function flashTitle() {
      if (titleFlashInterval) return;
      let on = true;
      titleFlashInterval = setInterval(() => {
        document.title = on ? '(' + unseenCount + ') New message!' : originalTitle;
        on = !on;
      }, 1000);
    }

    function notifyNewMessages(items) {
      if (isFirstSnapshot) {
        // On first load, just record the known IDs — don't notify
        isFirstSnapshot = false;
        knownIds = new Set(items.map(a => a.id));
        return;
      }

      const newItems = items.filter(a => !knownIds.has(a.id));
      if (!newItems.length) return;

      // Skip notification if this was our own message
      if (suppressNextNotif) {
        suppressNextNotif = false;
        return;
      }

      // Ring the bell animation + play sound
      ringBell();
      if (notifEnabled) playNotifSound();

      // If tab not focused → badge + title flash
      if (document.hidden) {
        unseenCount += newItems.length;
        notifBadge.textContent = unseenCount > 99 ? '99+' : unseenCount;
        notifBadge.classList.add('show');
        flashTitle();
      }

      // Browser push notification (if enabled + tab hidden)
      if (notifEnabled && document.hidden && 'Notification' in window && Notification.permission === 'granted') {
        const newest = newItems[newItems.length - 1];
        const body = newest.text
          ? (newest.text.length > 80 ? newest.text.slice(0, 80) + '…' : newest.text)
          : '📷 Image message';
        const n = new Notification('New Anonymous Message', {
          body: newItems.length > 1
            ? newItems.length + ' new messages — ' + body
            : body,
          icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">💬</text></svg>',
          tag: 'anon-bubble'
        });
        n.addEventListener('click', () => {
          window.focus();
          n.close();
        });
      }
    }

    /* ═══════════════════════════════════════════
       Load cached data instantly (before Firestore)
       ═══════════════════════════════════════════ */
    (function loadCache() {
      const cachedAnswers = cacheGet('cache_answers');
      if (cachedAnswers && cachedAnswers.length) {
        // Filter out expired items
        const now = Date.now();
        const valid = cachedAnswers.filter(a => now - a.ts < SIX_HOURS);
        if (valid.length) {
          knownIds = new Set(valid.map(a => a.id));
          render(valid);
        }
      }
      const cachedFood = cacheGet('cache_food');
      if (cachedFood && cachedFood.length) {
        foodItems = cachedFood;
        renderVoteList();
        updateRestoreBtn();
      }
    })();

    /* ═══════════════════════════════════════════
       Real-time listeners
       ═══════════════════════════════════════════ */
    // Bubble answers (gossip, etc.)
    answersRef.orderBy('ts', 'asc').onSnapshot((snapshot) => {
      const now = Date.now();
      const items = [];
      snapshot.forEach((doc) => {
        const d = doc.data();
        if (now - d.ts < SIX_HOURS) {
          items.push({ id: doc.id, text: d.text ?? '', ts: d.ts, image: d.image ?? null, replies: d.replies ?? [], reactions: d.reactions ?? {} });
        }
      });
      // Cache to localStorage (strip large images from replies to save space)
      try {
        const lite = items.map(a => ({
          ...a,
          replies: (a.replies || []).map(r => ({ text: r.text, ts: r.ts })),
        }));
        cacheSet('cache_answers', lite);
      } catch {}
      // Detect new messages for notifications
      notifyNewMessages(items);
      render(items);
    }, (err) => {
      console.error('Firestore error:', err);
      showToast('Connection error — check console (F12)', 'error');
    });

    // Food suggestions (vote & random)
    foodRef.orderBy('ts', 'asc').onSnapshot((snapshot) => {
      foodItems = [];
      snapshot.forEach((doc) => {
        const d = doc.data();
        foodItems.push({ id: doc.id, text: d.text, ts: d.ts, votes: d.votes ?? 0, removed: !!d.removed });
      });
      cacheSet('cache_food', foodItems);
      renderVoteList();
      updateRestoreBtn();
    }, (err) => {
      console.error('Food Firestore error:', err);
    });

    /* ═══════════════════════════════════════════
       Daily vote reset at 12 AM
       ═══════════════════════════════════════════ */
    function getTodayKey() {
      const d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    // On page load: reset votes if no one has done it today yet
    async function dailyReset() {
      const today = getTodayKey();

      // Check Firestore meta doc (shared across all users)
      const metaRef = db.collection('_meta').doc('daily_reset');
      const metaDoc = await metaRef.get();
      const lastResetDay = metaDoc.exists ? (metaDoc.data().day ?? '') : '';

      // Always clear local vote tracking if the local day differs
      const localDay = localStorage.getItem('food_vote_day') ?? '';
      if (localDay !== today) {
        localStorage.removeItem('food_voted');
        localStorage.setItem('food_vote_day', today);
      }

      // Only reset Firestore votes if no client has reset today yet
      if (lastResetDay === today) return;

      try {
        // Mark reset day in Firestore FIRST to prevent other clients from also resetting
        await metaRef.set({ day: today });

        const allFood = await foodRef.get();
        if (allFood.empty) return;
        const batch = db.batch();
        allFood.forEach((doc) => {
          if ((doc.data().votes ?? 0) !== 0) {
            batch.update(doc.ref, { votes: 0 });
          }
        });
        await batch.commit();
        resetInfoEl.textContent = '\uD83D\uDD04 Votes reset for today (' + today + ')';
        resetInfoEl.className = 'reset-info just-reset';
      } catch (e) {
        console.error('Daily vote reset failed:', e);
      }
    }
    dailyReset();

    // Show current day info if no reset was needed
    if (!resetInfoEl.textContent) {
      resetInfoEl.textContent = 'Votes reset daily at 12:00 AM';
    }

    // Also schedule a reset if the page stays open past midnight
    function scheduleMidnightReset() {
      const now = new Date();
      const midnight = new Date(now);
      midnight.setHours(24, 0, 0, 0);
      const msUntilMidnight = midnight - now;
      setTimeout(() => {
        dailyReset();
        scheduleMidnightReset();  // schedule next day
      }, msUntilMidnight + 500);  // +500ms buffer
    }
    scheduleMidnightReset();

    /* ═══════════════════════════════════════════
       Countdown timer
       ═══════════════════════════════════════════ */
    const countdownTimeInput = document.getElementById('countdownTime');
    const countdownSetBtn    = document.getElementById('countdownSetBtn');
    const countdownDigits    = document.getElementById('countdownDigits');
    const countdownLabel     = document.getElementById('countdownLabel');
    const countdownClear     = document.getElementById('countdownClear');
    const countdownRef       = db.doc('app_state/countdown');

    // Only show celebration once per day — persist across refresh
    function getCelebrationKey() {
      const d = new Date();

    function markCelebrationShown() {
      localStorage.setItem(getCelebrationKey(), '1');
    }

    function padZ(n) { return String(n).padStart(2, '0'); }

    // Confetti burst
    function spawnConfetti() {
      const colors = ['#f7c97e','#e06377','#7ec8e3','#c8b6ff','#58c5b5','#f2a154','#9b72cf'];
      for (let i = 0; i < 80; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.width = (6 + Math.random() * 8) + 'px';
        el.style.height = (6 + Math.random() * 8) + 'px';
        el.style.animationDuration = (2 + Math.random() * 3) + 's';
        el.style.animationDelay = (Math.random() * 1.5) + 's';
        document.body.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
      }
    }

    function showCelebration() {
      if (wasCelebrationShown()) return;
      markCelebrationShown();
      celebrationOverlay.classList.add('show');
      spawnConfetti();
      setTimeout(spawnConfetti, 1200);
    }

    celebrationClose.addEventListener('click', () => {
      celebrationOverlay.classList.remove('show');
    });

    // Default target: today at 6 PM (only active Mon-Fri, 9 AM - 6 PM)
    function getDefaultTarget() {
      const now = new Date();
      const day = now.getDay(); // 0=Sun, 6=Sat
      const h = now.getHours();
      // Only weekdays (Mon=1 to Fri=5)
      if (day === 0 || day === 6) return null;
      // Between 9 AM and 6 PM: count down to 6 PM
      if (h >= 9 && h < 18) {
        const target = new Date(now);
        target.setHours(18, 0, 0, 0);
        return target.getTime();
      }
      return null; // outside work hours
    }

    function tickCountdown(targetTs) {
      clearInterval(countdownInterval);
      function update() {
        const diff = targetTs - Date.now();
        if (diff <= 0) {
          clearInterval(countdownInterval);
          countdownDigits.innerHTML = '<span class="countdown-done">🎉 Off work! 🎉</span>';
          countdownLabel.textContent = 'Time to go home!';
          showCelebration();
          return;
        }
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        countdownDigits.textContent = padZ(h) + ':' + padZ(m) + ':' + padZ(s);
        countdownLabel.textContent = 'until freedom 🏃';
      }
      update();
      countdownInterval = setInterval(update, 1000);
    }

    // Set custom countdown — synced to Firebase so all users see same timer
    countdownSetBtn.addEventListener('click', async () => {
      const val = countdownTimeInput.value;
      if (!val) return;
      const [hh, mm] = val.split(':').map(Number);
      const target = new Date();
      target.setHours(hh, mm, 0, 0);
      if (target.getTime() <= Date.now()) {
        target.setDate(target.getDate() + 1);
      }
      try {
        await countdownRef.set({ targetTs: target.getTime() });
        showToast('Countdown set! ⏰', 'success');
      } catch {
        showToast('Failed to set countdown', 'error');
      }
    });

    // Clear custom countdown (falls back to auto default)
    countdownClear.addEventListener('click', async () => {
      try {
        await countdownRef.delete();
        clearInterval(countdownInterval);
        applyDefaultCountdown();
        showToast('Countdown cleared — using default', 'success');
      } catch {
        showToast('Failed to clear', 'error');
      }
    });

    function applyDefaultCountdown() {
      const target = getDefaultTarget();
      if (target) {
        tickCountdown(target);
      } else {
        const now = new Date();
        const day = now.getDay();
        const h = now.getHours();
        countdownDigits.textContent = '--:--:--';
        if (day === 0 || day === 6) {
          countdownLabel.textContent = 'It\u2019s the weekend! Enjoy \ud83c\udf1f';
        } else if (h < 9) {
          countdownLabel.textContent = 'Work starts at 9:00 AM \u2615';
        } else {
          countdownDigits.innerHTML = '<span class="countdown-done">\ud83c\udf89 Off work! \ud83c\udf89</span>';
          countdownLabel.textContent = 'Enjoy your evening!';
        }
      }
    }

    // Real-time listener — custom override from Firebase; falls back to auto default
    countdownRef.onSnapshot((snap) => {
      if (!snap.exists || !snap.data().targetTs) {
        clearInterval(countdownInterval);
        applyDefaultCountdown();
        return;
      }
      tickCountdown(snap.data().targetTs);
    });

    /* ── Cleanup: delete expired docs (runs once on each page load) ── */
    (async function cleanup() {
      const expiredCutoff = Date.now() - SIX_HOURS;
      const expired = await answersRef.where('ts', '<=', expiredCutoff).get();
      const batch = db.batch();
      expired.forEach((doc) => batch.delete(doc.ref));
      if (!expired.empty) batch.commit();
    })();
  </script>
</body>
</html>
