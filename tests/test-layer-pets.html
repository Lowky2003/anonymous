<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test: Per-Layer Pet Placement</title>
  <style>
    body { font-family: monospace; background: #1a1a2e; color: #eee; padding: 20px; }
    .pass { color: #34d399; }
    .fail { color: #f87171; font-weight: bold; }
    h2 { color: #a5b4fc; }
    .summary { margin-top: 20px; padding: 10px; border-radius: 8px; font-size: 16px; }
    .summary.all-pass { background: rgba(52,211,153,0.15); border: 1px solid #34d399; }
    .summary.has-fail { background: rgba(248,113,113,0.15); border: 1px solid #f87171; }
  </style>
</head>
<body>
  <h1>🧪 Per-Layer Pet Placement — Unit Tests</h1>
  <div id="results"></div>
  <div id="summary"></div>

  <script>
    // ─── Minimal stubs to test pet layer logic in isolation ───
    const MAX_PETS_PER_LAYER = 2;
    let currentLayer = 1;
    let roomData = { pets: [], unlockedLayers: 3 };

    function getPet(id) { return roomData.pets.find(p => p.id === id); }
    function getActivePets() { return roomData.pets.filter(p => p.layer === currentLayer); }
    function getPetsOnLayer(n) { return roomData.pets.filter(p => p.layer === n); }
    function getAllPlacedPets() { return roomData.pets.filter(p => p.layer != null && p.layer > 0); }
    function isPetOnOtherLayer(petId, layerNum) {
      const pet = getPet(petId);
      return pet && pet.layer != null && pet.layer > 0 && pet.layer !== layerNum;
    }
    function makePetId() { return 'p_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4); }

    // ─── Test runner ───
    let _passed = 0, _failed = 0;
    const resultsEl = document.getElementById('results');

    function assert(condition, msg) {
      if (condition) {
        _passed++;
        resultsEl.innerHTML += '<div class="pass">✓ ' + msg + '</div>';
      } else {
        _failed++;
        resultsEl.innerHTML += '<div class="fail">✗ ' + msg + '</div>';
      }
    }

    function resetPets() {
      roomData.pets = [];
      currentLayer = 1;
    }

    function addPet(type, layer) {
      const pet = { id: makePetId(), type: type, name: type, hunger: 100, thirst: 100, affection: 0, color: null, layer: layer, accessory: null };
      roomData.pets.push(pet);
      return pet;
    }

    // ─── TEST SUITE ───

    // 1. getActivePets returns only pets on current layer
    (function testGetActivePetsFiltersCurrentLayer() {
      resetPets();
      resultsEl.innerHTML += '<h2>1. getActivePets filters by currentLayer</h2>';
      const cat = addPet('cat', 1);
      const dog = addPet('dog', 2);
      const bunny = addPet('bunny', null);

      currentLayer = 1;
      assert(getActivePets().length === 1, 'Layer 1 has 1 pet (cat)');
      assert(getActivePets()[0].id === cat.id, 'Layer 1 pet is the cat');

      currentLayer = 2;
      assert(getActivePets().length === 1, 'Layer 2 has 1 pet (dog)');
      assert(getActivePets()[0].id === dog.id, 'Layer 2 pet is the dog');

      currentLayer = 3;
      assert(getActivePets().length === 0, 'Layer 3 has no pets');
    })();

    // 2. getPetsOnLayer returns correct pets
    (function testGetPetsOnLayer() {
      resetPets();
      resultsEl.innerHTML += '<h2>2. getPetsOnLayer returns correct pets</h2>';
      addPet('cat', 1);
      addPet('dog', 1);
      addPet('bunny', 2);
      addPet('fox', null);

      assert(getPetsOnLayer(1).length === 2, 'Layer 1 has 2 pets');
      assert(getPetsOnLayer(2).length === 1, 'Layer 2 has 1 pet');
      assert(getPetsOnLayer(3).length === 0, 'Layer 3 has 0 pets');
    })();

    // 3. Max 2 pets per layer enforced
    (function testMaxPetsPerLayer() {
      resetPets();
      resultsEl.innerHTML += '<h2>3. Max pets per layer constraint</h2>';
      addPet('cat', 1);
      addPet('dog', 1);

      const layerFull = getPetsOnLayer(1).length >= MAX_PETS_PER_LAYER;
      assert(layerFull === true, 'Layer 1 is full with 2 pets');

      // A new pet should NOT auto-place on full layer
      const layerPetCount = getPetsOnLayer(1).length;
      const autoLayer = layerPetCount < MAX_PETS_PER_LAYER ? 1 : null;
      assert(autoLayer === null, 'New pet gets layer=null when floor is full');
    })();

    // 4. Pet on one layer cannot be placed on another
    (function testPetCannotBeOnMultipleLayers() {
      resetPets();
      resultsEl.innerHTML += '<h2>4. Pet cannot exist on multiple layers</h2>';
      const cat = addPet('cat', 1);

      assert(isPetOnOtherLayer(cat.id, 2) === true, 'Cat on layer 1 is detected as on other layer when checking layer 2');
      assert(isPetOnOtherLayer(cat.id, 1) === false, 'Cat on layer 1 is NOT on other layer when checking layer 1');
    })();

    // 5. Unplaced pets (layer=null) are not active on any layer
    (function testUnplacedPetsNotActive() {
      resetPets();
      resultsEl.innerHTML += '<h2>5. Unplaced pets are not active</h2>';
      addPet('cat', null);
      addPet('dog', null);

      currentLayer = 1;
      assert(getActivePets().length === 0, 'No active pets on layer 1');
      currentLayer = 2;
      assert(getActivePets().length === 0, 'No active pets on layer 2');
      assert(getAllPlacedPets().length === 0, 'No placed pets at all');
    })();

    // 6. getAllPlacedPets returns pets across all layers
    (function testGetAllPlacedPets() {
      resetPets();
      resultsEl.innerHTML += '<h2>6. getAllPlacedPets returns all placed pets</h2>';
      addPet('cat', 1);
      addPet('dog', 2);
      addPet('bunny', 3);
      addPet('fox', null);

      assert(getAllPlacedPets().length === 3, '3 pets placed across layers');
      assert(roomData.pets.length === 4, '4 total pets including unplaced');
    })();

    // 7. Migration from old active boolean to layer
    (function testMigrationActiveToLayer() {
      resultsEl.innerHTML += '<h2>7. Migration from active (boolean) to layer</h2>';
      // Simulate old pet data with active flag
      const oldPets = [
        { id: 'p1', type: 'cat', name: 'Cat', hunger: 100, thirst: 100, affection: 0, color: null, active: true, accessory: null },
        { id: 'p2', type: 'dog', name: 'Dog', hunger: 80, thirst: 90, affection: 10, color: null, active: false, accessory: null }
      ];

      // Simulate migration logic
      const migrated = oldPets.map(p => {
        if (p.layer === undefined) {
          return { ...p, layer: p.active ? 1 : null };
        }
        return p;
      });

      assert(migrated[0].layer === 1, 'Active pet migrated to layer 1');
      assert(migrated[1].layer === null, 'Inactive pet migrated to layer null');
    })();

    // 8. Swap logic: remove from layer, place unplaced pet
    (function testSwapPetLogic() {
      resetPets();
      resultsEl.innerHTML += '<h2>8. Swap pet logic</h2>';
      const cat = addPet('cat', 1);
      const dog = addPet('dog', 1);
      const bunny = addPet('bunny', null);

      currentLayer = 1;
      assert(getPetsOnLayer(1).length === 2, 'Layer 1 starts with 2 pets');

      // Simulate swap: remove cat, place bunny
      cat.layer = null;
      bunny.layer = currentLayer;

      assert(getPetsOnLayer(1).length === 2, 'Layer 1 still has 2 pets after swap');
      assert(getPetsOnLayer(1).some(p => p.type === 'dog'), 'Dog remains on layer 1');
      assert(getPetsOnLayer(1).some(p => p.type === 'bunny'), 'Bunny is now on layer 1');
      assert(cat.layer === null, 'Cat is now unplaced');
    })();

    // 9. Each layer independent — different pets on different floors
    (function testLayersAreIndependent() {
      resetPets();
      resultsEl.innerHTML += '<h2>9. Layers are independent</h2>';
      const cat = addPet('cat', 1);
      const dog = addPet('dog', 2);

      currentLayer = 1;
      assert(getActivePets().length === 1, 'Layer 1 shows only its pet');
      assert(getActivePets()[0].type === 'cat', 'Layer 1 shows cat');

      currentLayer = 2;
      assert(getActivePets().length === 1, 'Layer 2 shows only its pet');
      assert(getActivePets()[0].type === 'dog', 'Layer 2 shows dog');

      // Moving pet from layer 1 to layer 2 should remove from layer 1
      cat.layer = 2;
      currentLayer = 1;
      assert(getActivePets().length === 0, 'Layer 1 is now empty after moving cat');
      currentLayer = 2;
      assert(getActivePets().length === 2, 'Layer 2 now has 2 pets');
    })();

    // 10. Visit list backward compatibility (active OR layer)
    (function testVisitListBackwardCompat() {
      resultsEl.innerHTML += '<h2>10. Visit list backward compatibility</h2>';
      const remotePets = [
        { type: 'cat', active: true },                   // Old format
        { type: 'dog', layer: 2 },                        // New format
        { type: 'bunny', active: false, layer: null },    // Inactive in both
        { type: 'fox', layer: 1 }                         // New format
      ];

      const visiblePets = remotePets.filter(p => (p.layer != null && p.layer > 0) || p.active);
      assert(visiblePets.length === 3, 'Visit list shows 3 placed pets');
      assert(visiblePets.some(p => p.type === 'cat'), 'Old active pet visible');
      assert(visiblePets.some(p => p.type === 'dog'), 'New layer pet visible');
      assert(visiblePets.some(p => p.type === 'fox'), 'New layer pet visible');
      assert(!visiblePets.some(p => p.type === 'bunny'), 'Inactive pet not visible');
    })();

    // ─── Summary ───
    const summaryEl = document.getElementById('summary');
    const total = _passed + _failed;
    if (_failed === 0) {
      summaryEl.className = 'summary all-pass';
      summaryEl.innerHTML = '✅ All ' + total + ' tests passed!';
    } else {
      summaryEl.className = 'summary has-fail';
      summaryEl.innerHTML = '❌ ' + _failed + ' / ' + total + ' tests failed!';
    }
  </script>
</body>
</html>
