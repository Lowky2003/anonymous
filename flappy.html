<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Flappy Bird — Mini Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      touch-action: manipulation;
    }

    /* ── Back button ── */
    .back-btn {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 50;
      padding: 8px 16px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      background: rgba(15, 12, 41, 0.9);
      backdrop-filter: blur(10px);
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.1); }

    /* ── Game header ── */
    .game-header {
      text-align: center;
      padding: 18px 20px 8px;
      z-index: 10;
    }
    .game-header h1 {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(90deg, #f7c97e, #f2a154);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .game-header p {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      margin-top: 2px;
    }

    /* ── Score display ── */
    .score-display {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 48px;
      font-weight: 900;
      color: rgba(255,255,255,0.25);
      z-index: 15;
      pointer-events: none;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    /* ── Canvas ── */
    canvas {
      display: block;
      touch-action: none;
      flex: 1;
      width: 100%;
      max-width: 480px;
    }

    /* ── Overlay screens ── */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(15, 12, 41, 0.88);
      backdrop-filter: blur(8px);
    }
    .overlay.hidden { display: none; }
    .overlay h2 {
      font-size: 36px;
      font-weight: 900;
      margin-bottom: 8px;
    }
    .overlay .final-score {
      font-size: 60px;
      font-weight: 900;
      background: linear-gradient(90deg, #f7c97e, #f2a154);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
    }
    .overlay .best-score {
      font-size: 16px;
      color: rgba(255,255,255,0.5);
      margin-top: 4px;
    }
    .overlay .new-best {
      color: #f7c97e;
      font-weight: 700;
      font-size: 14px;
      margin-top: 6px;
      animation: pulse 0.6s ease-in-out infinite alternate;
    }
    @keyframes pulse { from { opacity: 0.6; } to { opacity: 1; } }

    .play-btn {
      margin-top: 24px;
      padding: 16px 48px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(135deg, #f2a154, #f7c97e);
      color: #1a1a2e;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.12s;
    }
    .play-btn:hover { opacity: 0.9; }
    .play-btn:active { transform: scale(0.95); }
    .tap-hint {
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      margin-top: 10px;
    }

    /* ── Leaderboard ── */
    .leaderboard {
      margin-top: 20px;
      width: 280px;
      max-height: 260px;
      overflow-y: auto;
    }
    .lb-title {
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .lb-row {
      display: flex;
      align-items: center;
      padding: 8px 14px;
      border-radius: 10px;
      margin-bottom: 4px;
      background: rgba(255,255,255,0.06);
      font-size: 14px;
    }
    .lb-row.me { background: rgba(138, 120, 255, 0.18); }
    .lb-rank {
      width: 28px;
      font-weight: 800;
      color: rgba(255,255,255,0.4);
    }
    .lb-rank.gold { color: #f7c97e; }
    .lb-rank.silver { color: #c0c0c0; }
    .lb-rank.bronze { color: #cd7f32; }
    .lb-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .lb-score {
      font-weight: 800;
      color: #f7c97e;
      margin-left: 8px;
    }
    .lb-empty {
      text-align: center;
      color: rgba(255,255,255,0.25);
      font-size: 13px;
      padding: 16px 0;
    }

    /* ── Name input ── */
    .name-input {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .name-input input {
      padding: 10px 16px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-size: 14px;
      outline: none;
      width: 160px;
    }
    .name-input input::placeholder { color: rgba(255,255,255,0.35); }
    .name-input button {
      padding: 10px 18px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #7b5ea7, #5b6abf);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    /* scrollbar hide for leaderboard */
    .leaderboard::-webkit-scrollbar { width: 0; }
    .leaderboard { scrollbar-width: none; }

    @media (max-width: 480px) {
      .game-header { padding: 10px 20px 4px; }
      .game-header h1 { font-size: 18px; }
      .game-header p { font-size: 11px; }
      .score-display { font-size: 40px; top: 46px; }
      canvas { max-width: 100%; }
    }
  </style>
</head>
<body>

  <a href="index.html" class="back-btn">← Back</a>

  <div class="game-header">
    <h1>🐦 Flappy Bird</h1>
    <p>Tap or press Space to flap!</p>
  </div>

  <div class="score-display" id="scoreDisplay">0</div>
  <canvas id="gameCanvas"></canvas>

  <!-- Start screen -->
  <div class="overlay" id="startScreen">
    <h2>🐦 Flappy Bird</h2>
    <div class="name-input">
      <input type="text" id="playerName" placeholder="Your name" maxlength="20">
    </div>
    <button class="play-btn" id="startBtn">Play!</button>
    <div class="tap-hint">Tap / Space / Click to flap</div>
    <div class="leaderboard" id="startLeaderboard">
      <div class="lb-title">🏆 Leaderboard</div>
      <div id="startLbBody"><div class="lb-empty">Loading…</div></div>
    </div>
  </div>

  <!-- Game over screen -->
  <div class="overlay hidden" id="gameOverScreen">
    <h2>Game Over</h2>
    <div class="final-score" id="finalScore">0</div>
    <div class="best-score" id="bestScore"></div>
    <div class="new-best hidden" id="newBestLabel">⭐ New personal best!</div>
    <button class="play-btn" id="retryBtn">Play Again</button>
    <div class="tap-hint">Tap / Space / Click</div>
    <div class="leaderboard" id="overLeaderboard">
      <div class="lb-title">🏆 Leaderboard</div>
      <div id="overLbBody"></div>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const lbRef = db.collection('leaderboard_flappy');

    /* ═══════════════════════════════
       Canvas setup
       ═══════════════════════════════ */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      const maxW = Math.min(480, window.innerWidth);
      const maxH = window.innerHeight - 60;
      canvas.width = maxW;
      canvas.height = maxH;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    /* ═══════════════════════════════
       Game constants & state
       ═══════════════════════════════ */
    const GRAVITY = 0.45;
    const FLAP_STRENGTH = -7;
    const PIPE_WIDTH = 52;
    const PIPE_GAP = 140;
    const PIPE_SPEED = 2.5;
    const BIRD_SIZE = 24;

    let bird, pipes, score, bestLocalScore, gameRunning, gameWaiting, frameId;

    // Colors
    const SKY_TOP = '#1a1a3e';
    const SKY_BOT = '#302b63';
    const PIPE_COLOR = '#3ab0a2';
    const PIPE_EDGE = '#58c5b5';
    const BIRD_BODY = '#f7c97e';
    const BIRD_WING = '#f2a154';
    const GROUND_COLOR = '#1e1645';

    function initGame() {
      bird = { x: canvas.width * 0.28, y: canvas.height / 2, vy: 0, rotation: 0 };
      pipes = [];
      score = 0;
      gameRunning = false;
      document.getElementById('scoreDisplay').textContent = '0';
    }

    /* ═══════════════════════════════
       Drawing
       ═══════════════════════════════ */
    function drawBg() {
      const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
      grad.addColorStop(0, SKY_TOP);
      grad.addColorStop(1, SKY_BOT);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Stars
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      for (let i = 0; i < 30; i++) {
        const sx = (i * 97 + 13) % canvas.width;
        const sy = (i * 53 + 7) % (canvas.height * 0.6);
        ctx.fillRect(sx, sy, 2, 2);
      }

      // Ground
      ctx.fillStyle = GROUND_COLOR;
      ctx.fillRect(0, canvas.height - 20, canvas.width, 20);
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      ctx.fillRect(0, canvas.height - 20, canvas.width, 2);
    }

    function drawBird() {
      ctx.save();
      ctx.translate(bird.x, bird.y);
      const rot = Math.min(Math.max(bird.vy * 3, -30), 70) * Math.PI / 180;
      ctx.rotate(rot);

      // Body
      ctx.fillStyle = BIRD_BODY;
      ctx.beginPath();
      ctx.ellipse(0, 0, BIRD_SIZE, BIRD_SIZE * 0.75, 0, 0, Math.PI * 2);
      ctx.fill();

      // Wing
      ctx.fillStyle = BIRD_WING;
      ctx.beginPath();
      ctx.ellipse(-4, 4, BIRD_SIZE * 0.55, BIRD_SIZE * 0.35, -0.3, 0, Math.PI * 2);
      ctx.fill();

      // Eye
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(10, -6, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#1a1a2e';
      ctx.beginPath();
      ctx.arc(12, -5, 3, 0, Math.PI * 2);
      ctx.fill();

      // Beak
      ctx.fillStyle = '#e06377';
      ctx.beginPath();
      ctx.moveTo(BIRD_SIZE - 2, -2);
      ctx.lineTo(BIRD_SIZE + 10, 2);
      ctx.lineTo(BIRD_SIZE - 2, 6);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }

    function drawPipe(p) {
      const edgeH = 18;
      // Top pipe
      ctx.fillStyle = PIPE_COLOR;
      ctx.fillRect(p.x, 0, PIPE_WIDTH, p.topH);
      ctx.fillStyle = PIPE_EDGE;
      ctx.fillRect(p.x - 3, p.topH - edgeH, PIPE_WIDTH + 6, edgeH);

      // Bottom pipe
      const botY = p.topH + PIPE_GAP;
      ctx.fillStyle = PIPE_COLOR;
      ctx.fillRect(p.x, botY, PIPE_WIDTH, canvas.height - botY - 20);
      ctx.fillStyle = PIPE_EDGE;
      ctx.fillRect(p.x - 3, botY, PIPE_WIDTH + 6, edgeH);
    }

    function drawScore() {
      document.getElementById('scoreDisplay').textContent = score;
    }

    /* ═══════════════════════════════
       Game loop
       ═══════════════════════════════ */
    function flap() {
      if (gameWaiting) {
        gameWaiting = false;
        gameRunning = true;
        bird.vy = FLAP_STRENGTH;
        spawnPipe();
        return;
      }
      if (!gameRunning) return;
      bird.vy = FLAP_STRENGTH;
    }

    function spawnPipe() {
      const minTop = 60;
      const maxTop = canvas.height - PIPE_GAP - 80;
      const topH = minTop + Math.random() * (maxTop - minTop);
      pipes.push({ x: canvas.width + 10, topH, scored: false });
    }

    function update() {
      bird.vy += GRAVITY;
      bird.y += bird.vy;

      // Move pipes
      for (let i = pipes.length - 1; i >= 0; i--) {
        pipes[i].x -= PIPE_SPEED;
        if (pipes[i].x + PIPE_WIDTH < 0) {
          pipes.splice(i, 1);
          continue;
        }
        // Score
        if (!pipes[i].scored && pipes[i].x + PIPE_WIDTH < bird.x) {
          pipes[i].scored = true;
          score++;
        }
      }

      // Spawn pipes
      if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - 200) {
        spawnPipe();
      }

      // Collision: ground/ceiling
      if (bird.y + BIRD_SIZE * 0.75 > canvas.height - 20 || bird.y - BIRD_SIZE * 0.75 < 0) {
        return gameOver();
      }

      // Collision: pipes
      for (const p of pipes) {
        if (bird.x + BIRD_SIZE > p.x && bird.x - BIRD_SIZE < p.x + PIPE_WIDTH) {
          if (bird.y - BIRD_SIZE * 0.6 < p.topH || bird.y + BIRD_SIZE * 0.6 > p.topH + PIPE_GAP) {
            return gameOver();
          }
        }
      }
    }

    function draw() {
      drawBg();
      pipes.forEach(drawPipe);
      drawBird();
      drawScore();
    }

    function loop() {
      update();
      if (!gameRunning) return;
      draw();
      frameId = requestAnimationFrame(loop);
    }

    function startGame() {
      initGame();
      gameWaiting = true;
      gameRunning = false;
      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('gameOverScreen').classList.add('hidden');
      waitLoop();
    }

    function waitLoop() {
      // Bird hovers gently while waiting for first tap
      bird.y = canvas.height / 2 + Math.sin(Date.now() / 200) * 8;
      drawBg();
      drawBird();
      // Draw "Tap to start" hint
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.font = '16px Segoe UI, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Tap to start!', canvas.width / 2, canvas.height / 2 + 60);
      ctx.textAlign = 'left';
      if (gameWaiting) {
        frameId = requestAnimationFrame(waitLoop);
      } else {
        loop();
      }
    }

    function getBestKey() {
      return 'flappy_best_' + getPlayerName();
    }

    function gameOver() {
      gameRunning = false;
      cancelAnimationFrame(frameId);

      const bestKey = getBestKey();
      const prev = parseInt(localStorage.getItem(bestKey) || '0', 10);
      const isNew = score > prev && score > 0;
      if (isNew) localStorage.setItem(bestKey, score);
      bestLocalScore = Math.max(prev, score);

      document.getElementById('finalScore').textContent = score;
      document.getElementById('bestScore').textContent = 'Best: ' + bestLocalScore;
      const newLabel = document.getElementById('newBestLabel');
      if (isNew) {
        newLabel.classList.remove('hidden');
      } else {
        newLabel.classList.add('hidden');
      }
      document.getElementById('gameOverScreen').classList.remove('hidden');

      // Submit score
      submitScore(score);
    }

    /* ═══════════════════════════════
       Input
       ═══════════════════════════════ */
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.key === ' ') {
        e.preventDefault();
        if (gameWaiting) {
          flap();
        } else if (!gameRunning) {
          const overlay = document.getElementById('gameOverScreen');
          if (!overlay.classList.contains('hidden')) {
            startGame();
          }
        } else {
          flap();
        }
      }
    });

    canvas.addEventListener('click', () => { flap(); });
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); flap(); }, { passive: false });

    document.getElementById('startBtn').addEventListener('click', () => {
      const name = document.getElementById('playerName').value.trim();
      if (name) localStorage.setItem('flappy_name', name);
      startGame();
    });
    document.getElementById('retryBtn').addEventListener('click', startGame);

    // Allow tap anywhere on game over to restart
    document.getElementById('gameOverScreen').addEventListener('click', (e) => {
      if (e.target.closest('.leaderboard') || e.target.closest('.play-btn')) return;
      startGame();
    });

    /* ═══════════════════════════════
       Leaderboard
       ═══════════════════════════════ */
    function getPlayerName() {
      return localStorage.getItem('flappy_name') || 'Anonymous';
    }

    async function submitScore(s) {
      if (s <= 0) return;
      const name = getPlayerName();
      try {
        const docRef = lbRef.doc(name);
        const doc = await docRef.get();
        if (doc.exists) {
          const oldScore = doc.data().score || 0;
          if (s > oldScore) {
            await docRef.update({ score: s, ts: Date.now() });
          }
        } else {
          await docRef.set({ name, score: s, ts: Date.now() });
        }
      } catch (e) {
        console.error('Leaderboard submit error:', e);
      }
    }

    function renderLeaderboard(containerId, entries) {
      const el = document.getElementById(containerId);
      if (!entries.length) {
        el.innerHTML = '<div class="lb-empty">No scores yet — be the first!</div>';
        return;
      }
      const myName = getPlayerName();
      el.innerHTML = entries.map((e, i) => {
        const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
        const meClass = e.name === myName ? ' me' : '';
        const rankIcon = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1);
        return '<div class="lb-row' + meClass + '">' +
          '<span class="lb-rank ' + rankClass + '">' + rankIcon + '</span>' +
          '<span class="lb-name">' + escapeHtml(e.name) + '</span>' +
          '<span class="lb-score">' + e.score + '</span>' +
          '</div>';
      }).join('');
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Real-time leaderboard
    lbRef.orderBy('score', 'desc').limit(20).onSnapshot((snap) => {
      const entries = [];
      snap.forEach(doc => {
        const d = doc.data();
        entries.push({ name: d.name || 'Anonymous', score: d.score });
      });
      renderLeaderboard('startLbBody', entries);
      renderLeaderboard('overLbBody', entries);
    });

    /* ═══════════════════════════════
       Init
       ═══════════════════════════════ */
    // Clean up old global key
    localStorage.removeItem('flappy_best');
    localStorage.removeItem('flappy_player_id');

    const savedName = localStorage.getItem('flappy_name');
    if (savedName) document.getElementById('playerName').value = savedName;
    bestLocalScore = parseInt(localStorage.getItem(getBestKey()) || '0', 10);
    initGame();
    draw(); // draw initial frame
  </script>
</body>
</html>
