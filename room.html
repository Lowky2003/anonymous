    /* ═══════════════════════════════
       Canvas Room Background
       ═══════════════════════════════ */
    let bgAnimFrame = null;
    const bgClouds = [];
    const bgDust = [];
    let bgInited = false;

    function initBgParticles(rw, rh) {
      if (bgInited) return;
      bgInited = true;
      for (let i = 0; i < 5; i++) {
        bgClouds.push({ x: Math.random(), y: 0.06 + Math.random() * 0.12, w: 0.07 + Math.random() * 0.06, speed: 0.008 + Math.random() * 0.008 });
      }
      for (let i = 0; i < 25; i++) {
        bgDust.push({ x: Math.random(), y: Math.random() * 0.6, sz: 1 + Math.random() * 1.5, sp: 0.1 + Math.random() * 0.2, ph: Math.random() * Math.PI * 2 });
      }
    }

    function drawBgCloud(ctx, cx, cy, size) {
      ctx.beginPath();
      ctx.arc(cx, cy, size * 0.5, 0, Math.PI * 2);
      ctx.arc(cx + size * 0.4, cy - size * 0.2, size * 0.4, 0, Math.PI * 2);
      ctx.arc(cx + size * 0.7, cy, size * 0.35, 0, Math.PI * 2);
      ctx.arc(cx + size * 0.3, cy + size * 0.1, size * 0.3, 0, Math.PI * 2);
      ctx.fill();
    }

    /* ═══════════════════════════════
       Decoration Drawing
       ═══════════════════════════════ */
    function hasDecor(id) {
      return roomData.placedDecors && roomData.placedDecors.some(d => d.id === id);
    }

    function getDecorPos(id) {
      const p = roomData.placedDecors && roomData.placedDecors.find(d => d.id === id);
      const def = DECORATIONS.find(d => d.id === id);
      return p || (def ? { id, x: def.dx, y: def.dy } : { id, x: 0.5, y: 0.5 });
    }

    function drawRug(ctx, rw, rh, floorY) {
      // Find placed rug
      const rugIds = ['rug_blue','rug_green','rug_pink','rug_star'];
      const placedRug = (roomData.placedDecors || []).find(d => rugIds.includes(d.id));

      ctx.save();
      const pos = placedRug ? placedRug : null;
      const rugCX = pos ? pos.x * rw : rw * 0.38;
      const rugCY = pos ? pos.y * rh : floorY + (rh - floorY) * 0.5;
      const rugRX = rw * 0.13, rugRY = (rh - floorY) * 0.2;

      let fillColor = 'rgba(156,60,60,0.2)';
      let borderColor = 'rgba(140,50,50,0.18)';
      let centerColor = 'rgba(180,80,60,0.12)';
      let isStar = false;

      if (placedRug) {
        if (placedRug.id === 'rug_blue')  { fillColor = 'rgba(60,100,180,0.22)'; borderColor = 'rgba(50,80,160,0.2)'; centerColor = 'rgba(80,120,200,0.14)'; }
        else if (placedRug.id === 'rug_green') { fillColor = 'rgba(60,156,80,0.22)'; borderColor = 'rgba(50,130,60,0.2)'; centerColor = 'rgba(80,170,90,0.14)'; }
        else if (placedRug.id === 'rug_pink')  { fillColor = 'rgba(200,80,140,0.22)'; borderColor = 'rgba(180,60,120,0.2)'; centerColor = 'rgba(220,100,160,0.14)'; }
        else if (placedRug.id === 'rug_star')  { fillColor = 'rgba(180,150,60,0.22)'; borderColor = 'rgba(160,130,40,0.2)'; centerColor = 'rgba(200,170,80,0.14)'; isStar = true; }
      }

      ctx.fillStyle = 'rgba(0,0,0,0.06)';
      ctx.beginPath(); ctx.ellipse(rugCX, rugCY + 3, rugRX + 2, rugRY + 2, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = fillColor;
      ctx.beginPath(); ctx.ellipse(rugCX, rugCY, rugRX, rugRY, 0, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = borderColor; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.ellipse(rugCX, rugCY, rugRX * 0.78, rugRY * 0.78, 0, 0, Math.PI * 2); ctx.stroke();
      if (isStar) {
        ctx.fillStyle = centerColor;
        const sr = rugRX * 0.25;
        ctx.beginPath();
        for (let i = 0; i < 5; i++) {
          const a = (i * 4 * Math.PI / 5) - Math.PI / 2;
          const method = i === 0 ? 'moveTo' : 'lineTo';
          ctx[method](rugCX + Math.cos(a) * sr, rugCY + Math.sin(a) * sr * (rugRY / rugRX));
        }
        ctx.closePath(); ctx.fill();
      } else {
        ctx.fillStyle = centerColor;
        ctx.beginPath(); ctx.ellipse(rugCX, rugCY, rugRX * 0.35, rugRY * 0.35, 0, 0, Math.PI * 2); ctx.fill();
      }
      ctx.restore();
    }

    function drawWallDecorations(ctx, rw, rh, floorY, t) {
      // String lights — spans full width, y-position from stored pos
      if (hasDecor('stringlights')) {
        ctx.save();
        const pos = getDecorPos('stringlights');
        const lY = pos.y * rh;
        ctx.strokeStyle = 'rgba(120,100,80,0.3)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(0, lY + 6);
        for (let x = 0; x <= rw; x += 20) {
          ctx.lineTo(x, lY + 6 + Math.sin(x * 0.03) * 5);
        }
        ctx.stroke();
        const colors = ['#ffdd57','#ff6b6b','#48dbfb','#ff9ff3','#55efc4','#fd79a8'];
        for (let i = 0; i < Math.floor(rw / 28); i++) {
          const bx = 14 + i * 28;
          const by = lY + 8 + Math.sin(bx * 0.03) * 5;
          const glow = 0.3 + Math.sin(t / 600 + i * 0.8) * 0.15;
          ctx.fillStyle = colors[i % colors.length];
          ctx.globalAlpha = glow + 0.4;
          ctx.beginPath(); ctx.arc(bx, by, 3.5, 0, Math.PI * 2); ctx.fill();
          ctx.globalAlpha = glow * 0.3;
          ctx.beginPath(); ctx.arc(bx, by, 7, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.restore();
      }

      // Wall clock
      if (hasDecor('clock')) {
        ctx.save();
        const pos = getDecorPos('clock');
        const cx = pos.x * rw, cy = pos.y * rh, cr = rw * 0.035;
        ctx.fillStyle = 'rgba(0,0,0,0.06)';
        ctx.beginPath(); ctx.arc(cx + 1, cy + 2, cr + 2, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#f5efe6';
        ctx.strokeStyle = '#8B7355'; ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.arc(cx, cy, cr, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        ctx.strokeStyle = 'rgba(139,115,85,0.3)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(cx, cy, cr * 0.85, 0, Math.PI * 2); ctx.stroke();
        ctx.fillStyle = '#6d5a42';
        for (let i = 0; i < 12; i++) {
          const a = (i * Math.PI * 2 / 12) - Math.PI / 2;
          ctx.beginPath(); ctx.arc(cx + Math.cos(a) * cr * 0.72, cy + Math.sin(a) * cr * 0.72, 1.2, 0, Math.PI * 2); ctx.fill();
        }
        const now = new Date();
        const sec = now.getSeconds() + now.getMilliseconds() / 1000;
        const min = now.getMinutes() + sec / 60;
        const hr = (now.getHours() % 12) + min / 60;
        ctx.strokeStyle = '#4a3a2a'; ctx.lineWidth = 2; ctx.lineCap = 'round';
        const ha = (hr / 12) * Math.PI * 2 - Math.PI / 2;
        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + Math.cos(ha) * cr * 0.45, cy + Math.sin(ha) * cr * 0.45); ctx.stroke();
        ctx.lineWidth = 1.5;
        const ma = (min / 60) * Math.PI * 2 - Math.PI / 2;
        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + Math.cos(ma) * cr * 0.65, cy + Math.sin(ma) * cr * 0.65); ctx.stroke();
        ctx.strokeStyle = '#c44'; ctx.lineWidth = 0.7;
        const sa = (sec / 60) * Math.PI * 2 - Math.PI / 2;
        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + Math.cos(sa) * cr * 0.7, cy + Math.sin(sa) * cr * 0.7); ctx.stroke();
        ctx.fillStyle = '#4a3a2a';
        ctx.beginPath(); ctx.arc(cx, cy, 2, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }

      // Book shelf
      if (hasDecor('shelf')) {
        ctx.save();
        const pos = getDecorPos('shelf');
        const sx = pos.x * rw, sy = pos.y * rh, sw = rw * 0.12, sh = 6;
        ctx.fillStyle = '#7a6550';
        ctx.fillRect(sx + sw * 0.15, sy + sh, 3, 10);
        ctx.fillRect(sx + sw * 0.75, sy + sh, 3, 10);
        ctx.fillStyle = 'rgba(0,0,0,0.05)';
        ctx.fillRect(sx + 1, sy + 2, sw, sh + 2);
        ctx.fillStyle = '#a08868';
        roundRectPath(ctx, sx, sy, sw, sh, 1);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        ctx.fillRect(sx, sy, sw, 2);
        const bookColors = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6'];
        let bx = sx + 3;
        for (let i = 0; i < 5; i++) {
          const bw = sw * 0.12 + (i % 3) * 2;
          const bh = 14 + (i % 2) * 4;
          ctx.fillStyle = bookColors[i];
          roundRectPath(ctx, bx, sy - bh, bw, bh, 1);
          ctx.fill();
          ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 0.5;
          ctx.beginPath(); ctx.moveTo(bx + bw * 0.5, sy - bh + 3); ctx.lineTo(bx + bw * 0.5, sy - 2); ctx.stroke();
          bx += bw + 1.5;
        }
        ctx.restore();
      }

      // Hanging plant
      if (hasDecor('hangplant')) {
        ctx.save();
        const pos = getDecorPos('hangplant');
        const hx = pos.x * rw, hy = pos.y * rh;
        ctx.fillStyle = '#888'; ctx.beginPath(); ctx.arc(hx, hy, 2, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#c8b898'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
        const potY = hy + rh * 0.12;
        ctx.beginPath(); ctx.moveTo(hx - 8, potY - 4); ctx.quadraticCurveTo(hx - 4, hy + 4, hx, hy); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(hx + 8, potY - 4); ctx.quadraticCurveTo(hx + 4, hy + 4, hx, hy); ctx.stroke();
        ctx.lineWidth = 0.8;
        ctx.beginPath(); ctx.moveTo(hx - 6, potY - 15); ctx.lineTo(hx + 6, potY - 8); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(hx + 6, potY - 15); ctx.lineTo(hx - 6, potY - 8); ctx.stroke();
        ctx.fillStyle = '#c97b4b';
        ctx.beginPath();
        ctx.moveTo(hx - 9, potY - 4); ctx.lineTo(hx - 7, potY + 8); ctx.lineTo(hx + 7, potY + 8); ctx.lineTo(hx + 9, potY - 4); ctx.fill();
        ctx.fillStyle = '#b56a3a';
        ctx.fillRect(hx - 10, potY - 6, 20, 3);
        ctx.strokeStyle = '#5a9a4a'; ctx.lineWidth = 2; ctx.lineCap = 'round';
        const sway = Math.sin(t / 2000) * 2;
        ctx.beginPath(); ctx.moveTo(hx - 3, potY - 2); ctx.quadraticCurveTo(hx - 18 + sway, potY + 10, hx - 14 + sway, potY + 22); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(hx + 3, potY - 2); ctx.quadraticCurveTo(hx + 16 + sway, potY + 8, hx + 18 + sway, potY + 20); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(hx, potY - 3); ctx.quadraticCurveTo(hx - 10 + sway, potY + 14, hx - 6 + sway, potY + 26); ctx.stroke();
        ctx.fillStyle = '#6aaa4c';
        [-14, 6, 18].forEach((ox, i) => {
          const lx = hx + ox + sway * (i % 2 ? 1 : -1);
          const ly = potY + 16 + i * 3;
          ctx.beginPath(); ctx.ellipse(lx, ly, 5, 3, (i - 1) * 0.4, 0, Math.PI * 2); ctx.fill();
        });
        ctx.restore();
      }

      // Wall banner
      if (hasDecor('banner')) {
        ctx.save();
        const pos = getDecorPos('banner');
        const bx = pos.x * rw, by = pos.y * rh;
        const bw = rw * 0.05, bh = rh * 0.16;
        ctx.fillStyle = '#8B7355';
        ctx.fillRect(bx - 2, by, bw + 4, 3);
        const banGrad = ctx.createLinearGradient(bx, by, bx, by + bh);
        banGrad.addColorStop(0, '#e85d75');
        banGrad.addColorStop(1, '#c44060');
        ctx.fillStyle = banGrad;
        ctx.beginPath();
        ctx.moveTo(bx, by + 3); ctx.lineTo(bx, by + bh);
        ctx.lineTo(bx + bw / 2, by + bh - 10);
        ctx.lineTo(bx + bw, by + bh); ctx.lineTo(bx + bw, by + 3);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1;
        const dcx = bx + bw / 2, dcy = by + bh * 0.4;
        ctx.beginPath();
        ctx.moveTo(dcx, dcy - 8); ctx.lineTo(dcx + 6, dcy);
        ctx.lineTo(dcx, dcy + 8); ctx.lineTo(dcx - 6, dcy);
        ctx.closePath(); ctx.stroke();
        ctx.strokeStyle = '#d4a040'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(bx + bw / 2, by + bh - 10); ctx.lineTo(bx + bw / 2, by + bh - 2); ctx.stroke();
        ctx.fillStyle = '#d4a040';
        ctx.beginPath(); ctx.arc(bx + bw / 2, by + bh - 1, 2, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }
    }

    function drawFloorDecorations(ctx, rw, rh, floorY, t) {
      // Floor lamp — pos.y is base (feet), draws upward
      if (hasDecor('floorlamp')) {
        ctx.save();
        const pos = getDecorPos('floorlamp');
        const lx = pos.x * rw;
        const baseY = pos.y * rh;
        const lampH = (rh - floorY) * 0.65;
        // Base ellipse (feet)
        ctx.fillStyle = '#555';
        ctx.beginPath(); ctx.ellipse(lx, baseY, 10, 4, 0, 0, Math.PI * 2); ctx.fill();
        // Pole from base upward
        ctx.strokeStyle = '#777'; ctx.lineWidth = 3; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(lx, baseY); ctx.lineTo(lx, baseY - lampH + 8); ctx.stroke();
        // Shade at top
        const shadeY = baseY - lampH;
        ctx.fillStyle = '#f5e6c8';
        ctx.beginPath();
        ctx.moveTo(lx - 14, shadeY + 8); ctx.lineTo(lx - 10, shadeY - 6);
        ctx.lineTo(lx + 10, shadeY - 6); ctx.lineTo(lx + 14, shadeY + 8);
        ctx.fill();
        ctx.strokeStyle = '#c8a876'; ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(lx - 14, shadeY + 8); ctx.lineTo(lx - 10, shadeY - 6);
        ctx.lineTo(lx + 10, shadeY - 6); ctx.lineTo(lx + 14, shadeY + 8);
        ctx.closePath(); ctx.stroke();
        // Glow
        ctx.fillStyle = 'rgba(255,240,200,0.08)';
        ctx.beginPath(); ctx.ellipse(lx, baseY - lampH * 0.5, 30, lampH * 0.35, 0, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }

      // Side table
      if (hasDecor('sidetable')) {
        ctx.save();
        const pos = getDecorPos('sidetable');
        const tx = pos.x * rw, ty = pos.y * rh;
        const tw = rw * 0.08, th = (rh - floorY) * 0.28;
        ctx.fillStyle = 'rgba(0,0,0,0.04)';
        ctx.beginPath(); ctx.ellipse(tx + tw / 2, ty + th + 2, tw * 0.5, 3, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#8B7355';
        ctx.fillRect(tx + 2, ty + 4, 3, th - 2);
        ctx.fillRect(tx + tw - 5, ty + 4, 3, th - 2);
        const topGrad = ctx.createLinearGradient(tx, ty, tx, ty + 5);
        topGrad.addColorStop(0, '#b89a6e');
        topGrad.addColorStop(1, '#a08868');
        ctx.fillStyle = topGrad;
        roundRectPath(ctx, tx - 1, ty, tw + 2, 5, 1.5);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        ctx.fillRect(tx, ty, tw, 2);
        ctx.fillStyle = '#7faac8';
        ctx.beginPath();
        ctx.moveTo(tx + tw * 0.35, ty); ctx.lineTo(tx + tw * 0.3, ty - 12);
        ctx.quadraticCurveTo(tx + tw * 0.5, ty - 16, tx + tw * 0.7, ty - 12);
        ctx.lineTo(tx + tw * 0.65, ty); ctx.fill();
        ctx.fillStyle = '#ff8a8a';
        ctx.beginPath(); ctx.arc(tx + tw * 0.5, ty - 17, 3, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#5a9a4a'; ctx.strokeStyle = '#5a9a4a'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(tx + tw * 0.5, ty - 14); ctx.lineTo(tx + tw * 0.5, ty - 5); ctx.stroke();
        ctx.restore();
      }

      // Floor cushion
      if (hasDecor('cushion')) {
        ctx.save();
        const pos = getDecorPos('cushion');
        const cx = pos.x * rw, cy = pos.y * rh;
        const cw = 22, ch = 10;
        ctx.fillStyle = 'rgba(0,0,0,0.04)';
        ctx.beginPath(); ctx.ellipse(cx, cy + 3, cw + 1, ch + 1, 0, 0, Math.PI * 2); ctx.fill();
        const cushGrad = ctx.createRadialGradient(cx, cy - 2, 0, cx, cy, cw);
        cushGrad.addColorStop(0, '#e8a0c0');
        cushGrad.addColorStop(1, '#d080a0');
        ctx.fillStyle = cushGrad;
        ctx.beginPath(); ctx.ellipse(cx, cy, cw, ch, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.beginPath(); ctx.ellipse(cx - 4, cy - 3, cw * 0.5, ch * 0.4, -0.2, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(180,80,120,0.3)';
        ctx.beginPath(); ctx.arc(cx, cy, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }

      // Toy box
      if (hasDecor('toybox')) {
        ctx.save();
        const pos = getDecorPos('toybox');
        const bx = pos.x * rw, by = pos.y * rh;
        const bw = 30, bh = 22;
        ctx.fillStyle = 'rgba(0,0,0,0.04)';
        ctx.fillRect(bx + 2, by + bh - 1, bw, 3);
        ctx.fillStyle = '#d4a06a';
        roundRectPath(ctx, bx, by, bw, bh, 3);
        ctx.fill();
        ctx.fillStyle = '#c49058';
        ctx.fillRect(bx + 2, by + 2, bw - 4, bh - 4);
        ctx.fillStyle = '#f7c97e';
        ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('★', bx + bw / 2, by + bh / 2 + 3);
        ctx.fillStyle = '#ff6b6b';
        ctx.beginPath(); ctx.arc(bx + 8, by - 2, 5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#5b9bd5';
        ctx.fillRect(bx + bw - 10, by - 6, 4, 8);
        ctx.fillStyle = '#55efc4';
        ctx.fillRect(bx + bw - 8, by - 8, 4, 6);
        ctx.restore();
      }

      // Bookcase — pos.y is base (bottom), draws upward
      if (hasDecor('bookcase')) {
        ctx.save();
        const pos = getDecorPos('bookcase');
        const bx = pos.x * rw;
        const baseY = pos.y * rh;
        const bw = rw * 0.1, bh = (rh - floorY) * 0.7;
        const by = baseY - bh; // top of bookcase
        ctx.fillStyle = 'rgba(0,0,0,0.05)';
        ctx.fillRect(bx + 2, by + 2, bw + 1, bh + 1);
        ctx.fillStyle = '#7a6550';
        roundRectPath(ctx, bx, by, bw, bh, 2);
        ctx.fill();
        ctx.fillStyle = '#a08868';
        ctx.fillRect(bx + 2, by + 2, bw - 4, bh - 4);
        const shelfH = (bh - 8) / 3;
        for (let i = 0; i < 3; i++) {
          const sy = by + 4 + i * shelfH;
          ctx.fillStyle = '#8a7355';
          ctx.fillRect(bx + 2, sy + shelfH - 3, bw - 4, 3);
          const bkColors = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#e67e22','#1abc9c'];
          let bkx = bx + 4;
          for (let j = 0; j < 3 + (i % 2); j++) {
            const bkw = bw * 0.15 + (j % 3) * 1.5;
            const bkh = shelfH * 0.65 + (j % 2) * shelfH * 0.12;
            ctx.fillStyle = bkColors[(i * 3 + j) % bkColors.length];
            ctx.fillRect(bkx, sy + shelfH - 3 - bkh, bkw, bkh);
            bkx += bkw + 1;
          }
        }
        ctx.restore();
      }
    }

    /* ═══════════════════════════════
       Canvas Room Background
       ═══════════════════════════════ */
    function startRoomBgAnimation() {
      cancelAnimationFrame(bgAnimFrame);
      const cvs = document.getElementById('roomBgCanvas');
      if (!cvs) return;
      const room = cvs.parentElement;
      const rw = room.clientWidth, rh = room.clientHeight;
      cvs.width = rw; cvs.height = rh;
      const ctx = cvs.getContext('2d');
      initBgParticles(rw, rh);

      const floorY = rh * 0.65;
      const plankH = (rh - floorY) / 7;

      function frame(t) {
        ctx.clearRect(0, 0, rw, rh);

        /* ── Wall ── */
        const wallGrad = ctx.createLinearGradient(0, 0, 0, floorY);
        wallGrad.addColorStop(0, '#c8dff0');
        wallGrad.addColorStop(0.5, '#d6e5ee');
        wallGrad.addColorStop(1, '#e8ddd0');
        ctx.fillStyle = wallGrad;
        ctx.fillRect(0, 0, rw, floorY);
        // Subtle horizontal wall lines
        ctx.strokeStyle = 'rgba(180,170,155,0.06)';
        ctx.lineWidth = 1;
        for (let y = 0; y < floorY; y += 18) {
          ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(rw, y); ctx.stroke();
        }

        /* ── Window ── */
        const winW = rw * 0.18, winH = rh * 0.3;
        const winX = rw * 0.5 - winW / 2, winY = rh * 0.04;
        // Shadow behind frame
        ctx.fillStyle = 'rgba(0,0,0,0.08)';
        ctx.fillRect(winX - 2, winY + 4, winW + 4, winH + 4);
        // Outer frame
        ctx.fillStyle = '#8B7355';
        ctx.fillRect(winX - 5, winY - 5, winW + 10, winH + 10);
        // Inner frame
        ctx.fillStyle = '#a08868';
        ctx.fillRect(winX - 2, winY - 2, winW + 4, winH + 4);
        // Sky through window
        const skyGrad = ctx.createLinearGradient(winX, winY, winX, winY + winH);
        skyGrad.addColorStop(0, '#6cb4ee');
        skyGrad.addColorStop(0.6, '#a8d8ea');
        skyGrad.addColorStop(1, '#c5e8c5');
        ctx.fillStyle = skyGrad;
        ctx.fillRect(winX, winY, winW, winH);
        // Clouds moving in window
        ctx.save();
        ctx.beginPath(); ctx.rect(winX, winY, winW, winH); ctx.clip();
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        bgClouds.forEach(c => {
          const cx = winX + (((c.x + t * c.speed * 0.0001) % 1.3) - 0.15) * winW;
          drawBgCloud(ctx, cx, winY + c.y * winH, c.w * winW);
        });
        // Distant hills
        ctx.fillStyle = 'rgba(100,160,100,0.3)';
        ctx.beginPath();
        ctx.moveTo(winX, winY + winH);
        for (let x = 0; x <= winW; x += 4) {
          ctx.lineTo(winX + x, winY + winH * 0.7 + Math.sin(x * 0.04) * winH * 0.06);
        }
        ctx.lineTo(winX + winW, winY + winH);
        ctx.fill();
        ctx.restore();
        // Window cross
        ctx.strokeStyle = '#6d5a42'; ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(winX + winW / 2, winY); ctx.lineTo(winX + winW / 2, winY + winH);
        ctx.moveTo(winX, winY + winH / 2); ctx.lineTo(winX + winW, winY + winH / 2);
        ctx.stroke();
        // Window sill
        ctx.fillStyle = '#a08868';
        roundRectPath(ctx, winX - 8, winY + winH, winW + 16, 7, 2);
        ctx.fill();
        // Sill highlight
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.fillRect(winX - 6, winY + winH, winW + 12, 2);

        /* ── Sunlight beam from window ── */
        ctx.save();
        ctx.globalAlpha = 0.04 + Math.sin(t / 3000) * 0.01;
        ctx.fillStyle = '#fffbe0';
        ctx.beginPath();
        ctx.moveTo(winX, winY + winH + 7);
        ctx.lineTo(winX + winW, winY + winH + 7);
        ctx.lineTo(winX + winW + rw * 0.1, rh);
        ctx.lineTo(winX - rw * 0.05, rh);
        ctx.fill();
        ctx.restore();

        /* ── Wall Decorations (drawn over wall, before baseboard) ── */
        drawWallDecorations(ctx, rw, rh, floorY, t);

        /* ── Baseboard ── */
        ctx.fillStyle = '#6d5a42';
        ctx.fillRect(0, floorY - 2, rw, 8);
        ctx.fillStyle = 'rgba(255,255,255,0.06)';
        ctx.fillRect(0, floorY - 2, rw, 2);

        /* ── Floor ── */
        const floorGrad = ctx.createLinearGradient(0, floorY + 6, 0, rh);
        floorGrad.addColorStop(0, '#b89a6e');
        floorGrad.addColorStop(0.3, '#a68a5e');
        floorGrad.addColorStop(1, '#8B7355');
        ctx.fillStyle = floorGrad;
        ctx.fillRect(0, floorY + 6, rw, rh - floorY - 6);

        // Plank lines
        ctx.strokeStyle = 'rgba(90,70,48,0.25)';
        ctx.lineWidth = 1;
        for (let i = 1; i < 7; i++) {
          const py = floorY + 6 + i * plankH;
          ctx.beginPath(); ctx.moveTo(0, py); ctx.lineTo(rw, py); ctx.stroke();
        }
        // Vertical joints (staggered)
        for (let i = 0; i < 7; i++) {
          const off = (i % 2) * rw * 0.15;
          for (let x = off; x < rw; x += rw * 0.22) {
            ctx.beginPath();
            ctx.moveTo(x, floorY + 6 + i * plankH);
            ctx.lineTo(x, floorY + 6 + (i + 1) * plankH);
            ctx.stroke();
          }
        }
        // Wood grain (subtle)
        ctx.strokeStyle = 'rgba(120,90,55,0.06)';
        ctx.lineWidth = 0.5;
        for (let i = 0; i < 30; i++) {
          const gx = (i * rw / 30) + 5;
          const gy = floorY + 10 + (i * 17) % (rh - floorY - 20);
          ctx.beginPath();
          ctx.moveTo(gx, gy);
          ctx.quadraticCurveTo(gx + 15, gy + 3, gx + 30, gy - 1);
          ctx.stroke();
        }

        /* ── Oval rug (dynamic based on placed rug decor) ── */
        drawRug(ctx, rw, rh, floorY);

        /* ── Floor Decorations ── */
        drawFloorDecorations(ctx, rw, rh, floorY, t);

        /* ── Floating dust motes in sunlight ── */
        bgDust.forEach(p => {
          const px = p.x * rw + Math.sin(t / 2500 + p.ph) * 18;
          const py = p.y * rh + Math.cos(t / 3500 + p.ph) * 12;
          const a = 0.12 + Math.sin(t / 1200 + p.ph) * 0.08;
          ctx.fillStyle = `rgba(255,255,230,${a})`;
          ctx.beginPath(); ctx.arc(px, py, p.sz, 0, Math.PI * 2); ctx.fill();
        });

        bgAnimFrame = requestAnimationFrame(frame);
      }
      bgAnimFrame = requestAnimationFrame(frame);
    }

    /* ═══════════════════════════════
       Canvas Pet — 2D wander + drawing
       ═══════════════════════════════ */
    let petAnimFrame = null;
    let petStates = {};
    function getPetState(id, idx) {
      if (!petStates[id]) {
        petStates[id] = {
          x: 0.15 + idx * 0.25, y: 0.75 + Math.random() * 0.08,
          tx: 0.5, ty: 0.78,
          speed: 0.0004, nextWander: 0, facingRight: true,
          action: null, actionEnd: 0, actionCooldown: 0,
          // Natural movement additions
          vx: 0, vy: 0,              // velocity for smooth accel/decel
          pauseUntil: 0,             // occasional pause timestamp
          idlePhase: Math.random() * Math.PI * 2  // breathing offset
        };
      }
      return petStates[id];
    }

    const PET_ACTIONS = {
      cat:     ['groom', 'stretch', 'nap', 'yawn', 'sleep'],
      dog:     ['sit', 'pant', 'scratch', 'playbow', 'sleep'],
      bunny:   ['sniff', 'hop', 'standup', 'eartwitch', 'sleep'],
      hamster: ['stuff', 'groom', 'spin', 'sleep'],
      fox:     ['pounce', 'yawn', 'crouch', 'sneak', 'sleep'],
      panda:   ['eat', 'roll', 'wave', 'sit', 'sleep']
    };

    function pickAction(type) {
      const acts = PET_ACTIONS[type] || PET_ACTIONS.cat;
      return acts[Math.floor(Math.random() * acts.length)];
    }

    function startPetAnimation(pets) {
      cancelAnimationFrame(petAnimFrame);
      const cvs = document.getElementById('petCanvas');
      if (!cvs) return;
      const room = cvs.parentElement.parentElement;
      let rw = room.clientWidth, rh = room.clientHeight;
      cvs.width = rw; cvs.height = rh;
      const ctx = cvs.getContext('2d');

      // Ensure each pet has a state
      pets.forEach((p, i) => getPetState(p.type, i));

      function frame(t) {
        // Update canvas size if room resized
        const nw = room.clientWidth, nh = room.clientHeight;
        if (nw && nh && (nw !== rw || nh !== rh)) {
          rw = nw; rh = nh; cvs.width = rw; cvs.height = rh;
        }
        ctx.clearRect(0, 0, rw, rh);
        const now = Date.now();

        for (const p of pets) { try {
          const st = petStates[p.type];
          // Live hunger read
          const hunger = roomData.petHunger[p.type] ?? p.hunger;
          let moving = false;
          let actionProgress = -1;
          let currentAction = null;

          // Action system
          if (st.action && now < st.actionEnd) {
            currentAction = st.action;
            const dur = st.actionDur || 2500;
            actionProgress = (now - (st.actionEnd - dur)) / dur;
            actionProgress = Math.max(0, Math.min(1, actionProgress));
          } else {
            if (st.action) {
              st.action = null;
              st.actionCooldown = now + 4000 + Math.random() * 5000;
            }
            if (!st.action && now > st.actionCooldown && Math.random() < 0.008) {
              st.action = pickAction(p.type);
              // Sleep/nap lasts longer
              st.actionDur = (st.action === 'sleep' || st.action === 'nap') ? 5000 + Math.random() * 3000 : 2500;
              st.actionEnd = now + st.actionDur;
            }

            // Wander
            if (now > st.nextWander) {
              st.tx = 0.06 + Math.random() * 0.60;
              st.ty = 0.72 + Math.random() * 0.18;
              st.nextWander = now + 4000 + Math.random() * 6000;
              // Occasionally pause before moving
              if (Math.random() < 0.35) {
                st.pauseUntil = now + 800 + Math.random() * 1500;
              }
            }

            // Pausing?
            if (now < st.pauseUntil) {
              moving = false;
              st.vx *= 0.9; st.vy *= 0.9;
            } else {
              const dx = st.tx - st.x;
              const dy = st.ty - st.y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              const wantMove = dist > 0.005;

              if (wantMove) {
                const maxSpeed = st.speed * (hunger > 30 ? 1 : 0.5);
                // Ease in/out: accelerate smoothly, decelerate near target
                const easeIn = 0.08;
                const decelDist = 0.08;
                const speedMult = dist < decelDist ? (dist / decelDist) * 0.6 + 0.4 : 1;
                const targetVx = (dx / dist) * maxSpeed * speedMult * 16;
                const targetVy = (dy / dist) * maxSpeed * speedMult * 16;
                st.vx += (targetVx - st.vx) * easeIn;
                st.vy += (targetVy - st.vy) * easeIn;
                st.x += st.vx;
                st.y += st.vy;
                moving = true;
                if (Math.abs(dx) > 0.01) st.facingRight = dx > 0;
              } else {
                // Decelerate to stop
                st.vx *= 0.85;
                st.vy *= 0.85;
                st.x += st.vx;
                st.y += st.vy;
                moving = Math.abs(st.vx) > 0.00005 || Math.abs(st.vy) > 0.00005;
              }
            }
          }

          // Clamp pet to floor area (floor starts at 0.65 normalized)
          st.x = Math.max(0.04, Math.min(0.70, st.x));
          st.y = Math.max(0.70, Math.min(0.92, st.y));

          const px = st.x * rw;
          const py = st.y * rh;
          const depthScale = 0.6 + (st.y - 0.6) * 2.0;
          const baseSize = PET_SIZES[p.type] || 44;
          const size = baseSize * depthScale;

          ctx.save();
          ctx.translate(px, py);
          ctx.scale(st.facingRight ? depthScale : -depthScale, depthScale);

          // Natural bob: walking has bounce, idle has gentle breathing
          let bob = 0;
          let legPhase = 0;
          if (moving) {
            const walkSpeed = Math.sqrt(st.vx * st.vx + st.vy * st.vy) * 800;
            bob = Math.sin(t / 100) * (1.5 + walkSpeed * 0.5);
            legPhase = t / 100;
          } else {
            // Idle breathing sway
            bob = Math.sin(t / 800 + st.idlePhase) * 0.8;
            // Tiny body sway
            ctx.rotate(Math.sin(t / 1200 + st.idlePhase) * 0.015);
          }
          ctx.translate(0, bob);

          if (currentAction && actionProgress >= 0) {
            applyActionTransform(ctx, p.type, currentAction, actionProgress, size, t);
          }

          drawPetCanvas(ctx, p.type, size, legPhase, moving, hunger, t, currentAction, actionProgress);
          ctx.restore();

          // Action floating effects
          if (currentAction && actionProgress >= 0) {
            ctx.save();
            drawActionEffect(ctx, px, py, size, depthScale, p.type, currentAction, actionProgress, t);
            ctx.restore();
          }

          // Hunger bar above pet
          const barW = 52 * depthScale;
          const barH = 6 * depthScale;
          const barX = px - barW / 2;
          const barY = py - size * 1.5;
          ctx.fillStyle = 'rgba(0,0,0,0.45)';
          roundRectPath(ctx, barX, barY, barW, barH, 3);
          ctx.fill();
          const hColor = hunger > 50 ? '#34d399' : hunger > 20 ? '#fbbf24' : '#f87171';
          ctx.fillStyle = hColor;
          roundRectPath(ctx, barX, barY, barW * (hunger / 100), barH, 3);
          ctx.fill();

          // Hunger percentage
          ctx.fillStyle = 'rgba(255,255,255,0.9)';
          ctx.font = 'bold ' + Math.round(8 * depthScale) + 'px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(Math.round(hunger) + '%', px, barY + barH + 10 * depthScale);

          // Pet name
          const petDef = PETS.find(x => x.id === p.type);
          ctx.fillStyle = 'rgba(255,255,255,0.85)';
          ctx.font = 'bold ' + Math.round(10 * depthScale) + 'px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(petDef?.name || 'Pet', px, barY - 12 * depthScale);

          // Affection (好感度) + title
          const aff = roomData.petAffection[p.type] ?? 0;
          const affTitle = getAffectionTitle(aff);
          ctx.fillStyle = 'rgba(255,150,180,0.9)';
          ctx.font = Math.round(7 * depthScale) + 'px sans-serif';
          ctx.fillText('♥ ' + aff + '  ' + affTitle.title, px, barY - 2 * depthScale);
        } catch(e) { ctx.restore(); } }

        petAnimFrame = requestAnimationFrame(frame);
      }
      petAnimFrame = requestAnimationFrame(frame);
    }

    function roundRectPath(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.arcTo(x + w, y, x + w, y + r, r);
      ctx.lineTo(x + w, y + h - r);
      ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
      ctx.lineTo(x + r, y + h);
      ctx.arcTo(x, y + h, x, y + h - r, r);
      ctx.lineTo(x, y + r);
      ctx.arcTo(x, y, x + r, y, r);
      ctx.closePath();
    }

    /* ── Action body transforms ── */
    function applyActionTransform(ctx, type, action, ap, s, t) {
      const ease = Math.sin(ap * Math.PI); // 0→1→0 bell curve
      switch (action) {
        // ── Shared-ish poses ──
        case 'nap': case 'sleep': {
          // Lie down: tilt sideways, squish flat, gentle breathing
          const settle = Math.min(1, ap * 5); // quick settle into pose (first 20%)
          const breath = Math.sin(t / 600) * 0.02 * settle; // gentle breathing
          ctx.translate(0, s * 0.15 * settle); // sink lower
          ctx.rotate(0.25 * settle);           // tilt to lie on side
          ctx.scale(1.12 + breath, 0.75 - breath * 0.5); // flatten wide + breathe
          break;
        }
        case 'stretch':
          ctx.scale(1 + 0.18 * ease, 1 - 0.06 * ease);
          break;
        case 'yawn':
          ctx.rotate(Math.sin(ap * Math.PI * 2) * 0.04);
          break;
        case 'sit':
          ctx.translate(0, s * 0.05 * ease);
          ctx.rotate(-0.08 * ease);
          break;
        case 'hop':
          ctx.translate(0, -s * 0.35 * Math.sin(ap * Math.PI));
          break;
        case 'spin': case 'roll':
          ctx.rotate(ap * Math.PI * 2);
          break;
        case 'pounce':
          if (ap < 0.4) {
            ctx.translate(0, s * 0.1 * (ap / 0.4));
            ctx.scale(1 + 0.08 * (ap / 0.4), 1 - 0.1 * (ap / 0.4));
          } else {
            const jump = (ap - 0.4) / 0.6;
            ctx.translate(0, -s * 0.4 * Math.sin(jump * Math.PI));
          }
          break;
        case 'playbow':
          ctx.rotate(0.15 * ease);
          ctx.translate(0, s * 0.04 * ease);
          break;
        case 'scratch':
          ctx.rotate(Math.sin(t / 60) * 0.08 * ease);
          break;
        case 'pant':
          ctx.translate(0, Math.sin(t / 80) * s * 0.02);
          break;
        case 'standup':
          ctx.rotate(-0.3 * ease);
          ctx.translate(0, -s * 0.15 * ease);
          break;
        case 'sniff': case 'eartwitch':
          ctx.translate(Math.sin(t / 50) * s * 0.01 * ease, 0);
          break;
        case 'stuff':
          ctx.scale(1 + 0.06 * ease, 1 + 0.08 * ease); // inflate
          break;
        case 'groom':
          ctx.rotate(-0.06 * ease);
          break;
        case 'crouch': case 'sneak':
          ctx.translate(0, s * 0.06 * ease);
          ctx.scale(1 + 0.08 * ease, 1 - 0.12 * ease);
          break;
        case 'wave':
          ctx.rotate(Math.sin(t / 150) * 0.06 * ease);
          break;
        case 'eat':
          ctx.translate(Math.sin(t / 200) * s * 0.01, 0);
          break;
      }
    }

    /* ── Action floating effects ── */
    function drawActionEffect(ctx, px, py, size, ds, type, action, ap, t) {
      const ease = Math.sin(ap * Math.PI);
      ctx.save();

      switch (action) {
        case 'nap': case 'sleep': {
          // Floating Z's — continuously visible, close to pet head
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          const zCount = 3;
          const cycle = (t % 3000) / 3000; // 0→1 loop every 3s
          for (let i = 0; i < zCount; i++) {
            const phase = (cycle + i / zCount) % 1; // staggered
            const zy = py - size * 0.4 - phase * 30 * ds;
            const zx = px + (5 + i * 5) * ds + Math.sin(t / 500 + i * 2) * 3 * ds;
            const fadeIn = Math.min(1, phase * 4);
            const fadeOut = Math.max(0, 1 - (phase - 0.6) / 0.4);
            const alpha = fadeIn * fadeOut * 0.75 * ease;
            if (alpha <= 0) continue;
            ctx.globalAlpha = alpha;
            ctx.fillStyle = 'rgba(150,180,255,0.85)';
            ctx.font = 'bold ' + Math.round((11 + i * 4) * ds) + 'px sans-serif';
            ctx.fillText('z', zx, zy);
          }
          break;
        }
        case 'yawn': {
          // Sparkle/tear near mouth
          ctx.globalAlpha = ease * 0.5;
          ctx.fillStyle = '#88ccff';
          const tx = px + size * 0.5 * ((petStates[type]?.facingRight) ? 1 : -1);
          const ty = py - size * 0.1;
          ctx.beginPath(); ctx.arc(tx, ty, 2 * ds, 0, Math.PI * 2); ctx.fill();
          break;
        }
        case 'groom': case 'stuff': {
          // Motion lines near face
          ctx.strokeStyle = 'rgba(200,200,200,0.4)';
          ctx.lineWidth = 1;
          for (let i = 0; i < 3; i++) {
            const angle = -0.5 + i * 0.5 + Math.sin(t / 100) * 0.3;
            const fx = px + Math.cos(angle) * size * 0.6;
            const fy = py - size * 0.3 + Math.sin(angle) * size * 0.3;
            ctx.globalAlpha = ease * 0.4;
            ctx.beginPath();
            ctx.moveTo(fx, fy);
            ctx.lineTo(fx + Math.cos(angle) * 6 * ds, fy + Math.sin(angle) * 6 * ds);
            ctx.stroke();
          }
          break;
        }
        case 'stretch': {
          // Stretch lines
          ctx.strokeStyle = 'rgba(255,220,150,0.3)';
          ctx.lineWidth = 1;
          ctx.globalAlpha = ease * 0.5;
          for (let i = 0; i < 4; i++) {
            const sy = py - size * 0.2 + i * size * 0.12;
            const dir = (i % 2 === 0) ? 1 : -1;
            ctx.beginPath();
            ctx.moveTo(px + dir * size * 0.5, sy);
            ctx.lineTo(px + dir * size * 0.7, sy);
            ctx.stroke();
          }
          break;
        }
        case 'hop': case 'pounce': {
          // Dust puffs below during jump
          if (ap > 0.05 && ap < 0.3) {
            ctx.globalAlpha = (0.3 - ap) * 2;
            ctx.fillStyle = 'rgba(180,160,130,0.3)';
            for (let i = 0; i < 3; i++) {
              const dx = px + (i - 1) * 8 * ds;
              const dy = py + size * 0.3;
              ctx.beginPath(); ctx.arc(dx, dy, (3 + i) * ds, 0, Math.PI * 2); ctx.fill();
            }
          }
          break;
        }
        case 'spin': case 'roll': {
          // Circular motion lines
          ctx.strokeStyle = 'rgba(200,200,200,0.25)';
          ctx.lineWidth = 1.5;
          ctx.globalAlpha = ease * 0.4;
          for (let i = 0; i < 3; i++) {
            const a = t / 200 + i * Math.PI * 0.7;
            const r = size * 0.8;
            ctx.beginPath();
            ctx.arc(px, py, r, a, a + 0.5);
            ctx.stroke();
          }
          break;
        }
        case 'sit': case 'wave': {
          // Floating heart
          if (ap > 0.3 && ap < 0.8) {
            ctx.globalAlpha = Math.sin((ap - 0.3) / 0.5 * Math.PI) * 0.6;
            ctx.fillStyle = '#ff6b8a';
            ctx.font = Math.round(11 * ds) + 'px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('♥', px + 15 * ds, py - size * 1.4 - (ap - 0.3) * 25 * ds);
          }
          break;
        }
        case 'scratch': {
          // Scratch lines near ear
          ctx.strokeStyle = 'rgba(200,180,150,0.35)';
          ctx.lineWidth = 1;
          ctx.globalAlpha = ease * 0.5;
          const earX = px + size * 0.3 * ((petStates[type]?.facingRight) ? -1 : 1);
          const earY = py - size * 0.8;
          for (let i = 0; i < 3; i++) {
            ctx.beginPath();
            ctx.moveTo(earX + (i - 1) * 3 * ds, earY);
            ctx.lineTo(earX + (i - 1) * 3 * ds + Math.sin(t / 50) * 4, earY + 8 * ds);
            ctx.stroke();
          }
          break;
        }
        case 'pant': {
          // Drool drop
          if (ap > 0.3) {
            const dripY = py + size * 0.1 + (ap - 0.3) * 15 * ds;
            ctx.globalAlpha = Math.min(1, (ap - 0.3) * 2) * 0.4;
            ctx.fillStyle = '#88ccff';
            ctx.beginPath();
            const dripX = px + size * 0.35 * ((petStates[type]?.facingRight) ? 1 : -1);
            ctx.arc(dripX, dripY, 1.5 * ds, 0, Math.PI * 2);
            ctx.fill();
          }
          break;
        }
        case 'playbow': {
          // Exclamation
          if (ap > 0.2 && ap < 0.7) {
            ctx.globalAlpha = Math.sin((ap - 0.2) / 0.5 * Math.PI) * 0.6;
            ctx.fillStyle = '#ffcc00';
            ctx.font = 'bold ' + Math.round(13 * ds) + 'px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('!', px + 18 * ds, py - size * 1.5);
          }
          break;
        }
        case 'sniff': case 'eartwitch': {
          // Question mark / curiosity
          if (ap > 0.2 && ap < 0.8) {
            ctx.globalAlpha = Math.sin((ap - 0.2) / 0.6 * Math.PI) * 0.5;
            ctx.fillStyle = '#ccc';
            ctx.font = Math.round(10 * ds) + 'px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('?', px + 14 * ds, py - size * 1.4);
          }
          break;
        }
        case 'standup': {
          // Sparkle stars
          ctx.fillStyle = 'rgba(255,230,100,0.5)';
          ctx.globalAlpha = ease * 0.5;
          for (let i = 0; i < 2; i++) {
            const sx = px + (i * 20 - 10) * ds + Math.sin(t / 300 + i) * 5;
            const sy = py - size * 1.6 - i * 8 * ds;
            drawStar(ctx, sx, sy, 3 * ds);
          }
          break;
        }
        case 'crouch': case 'sneak': {
          // Ellipsis (...) sneaking
          if (ap > 0.15 && ap < 0.85) {
            ctx.globalAlpha = 0.4;
            ctx.fillStyle = '#aaa';
            ctx.font = Math.round(10 * ds) + 'px sans-serif';
            ctx.textAlign = 'center';
            const dots = '.'.repeat(1 + Math.floor((t / 300) % 3));
            ctx.fillText(dots, px + 16 * ds, py - size * 1.3);
          }
          break;
        }
        case 'eat': {
          // Crumbs falling
          ctx.fillStyle = 'rgba(120,160,80,0.4)';
          ctx.globalAlpha = ease * 0.5;
          for (let i = 0; i < 3; i++) {
            const cx = px + (Math.sin(t / 200 + i * 2) * 8 - 4) * ds;
            const cy = py - size * 0.2 + (ap * 30 + i * 6) * ds;
            ctx.beginPath(); ctx.arc(cx, cy, 1.5 * ds, 0, Math.PI * 2); ctx.fill();
          }
          break;
        }
      }
      ctx.restore();
    }

    function drawStar(ctx, x, y, r) {
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const a = (i * 4 * Math.PI / 5) - Math.PI / 2;
        const method = i === 0 ? 'moveTo' : 'lineTo';
        ctx[method](x + Math.cos(a) * r, y + Math.sin(a) * r);
      }
      ctx.closePath();
      ctx.fill();
    }

    /* ── Draw pet by type ── */
    function drawPetCanvas(ctx, type, size, legPhase, moving, hunger, t, action, ap) {
      switch (type) {
        case 'cat':    drawCatPet(ctx, size, legPhase, moving, hunger, action, ap, t); break;
        case 'dog':    drawDogPet(ctx, size, legPhase, moving, hunger, action, ap, t); break;
        case 'bunny':  drawBunnyPet(ctx, size, legPhase, moving, hunger, action, ap, t); break;
        case 'hamster':drawHamsterPet(ctx, size, legPhase, moving, hunger, action, ap, t); break;
        case 'fox':    drawFoxPet(ctx, size, legPhase, moving, hunger, action, ap, t); break;
        case 'panda':  drawPandaPet(ctx, size, legPhase, moving, hunger, action, ap, t); break;
        default:       drawCatPet(ctx, size, legPhase, moving, hunger, action, ap, t);
      }
    }

    /* ── Cat ── */
    function drawCatPet(ctx, s, lp, moving, hunger, action, ap, t) {
      const sleeping = action === 'sleep' || action === 'nap';
      const bodyColor = '#f5a623';
      const darkColor = '#d4871a';
      const stripe = '#c97a15';
      // Tail behind body
      ctx.strokeStyle = bodyColor;
      ctx.lineWidth = s * 0.07;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-s * 0.45, -s * 0.05);
      ctx.bezierCurveTo(-s * 0.65, -s * 0.15, -s * 0.72, -s * 0.45, -s * 0.48, -s * 0.52);
      ctx.stroke();
      // Tail stripes
      ctx.strokeStyle = stripe; ctx.lineWidth = s * 0.022;
      for (let i = 0; i < 3; i++) {
        const t = 0.3 + i * 0.25, tx = -s * (0.48 + t * 0.15), ty = -s * (0.05 + t * 0.35);
        ctx.beginPath(); ctx.moveTo(tx - s*0.035, ty - s*0.025); ctx.lineTo(tx + s*0.035, ty + s*0.025); ctx.stroke();
      }
      // Body
      ctx.fillStyle = bodyColor;
      ctx.beginPath(); ctx.ellipse(0, 0, s * 0.5, s * 0.35, 0, 0, Math.PI * 2); ctx.fill();
      // Body stripes
      ctx.strokeStyle = stripe; ctx.lineWidth = s * 0.018;
      for (let i = 0; i < 3; i++) {
        const sx = -s * 0.15 + i * s * 0.15;
        ctx.beginPath(); ctx.moveTo(sx, -s * 0.28); ctx.quadraticCurveTo(sx + s*0.02, -s*0.14, sx, 0); ctx.stroke();
      }
      // Head
      ctx.fillStyle = bodyColor;
      ctx.beginPath(); ctx.arc(s * 0.35, -s * 0.18, s * 0.28, 0, Math.PI * 2); ctx.fill();
      // Ears
      ctx.fillStyle = darkColor;
      ctx.beginPath(); ctx.moveTo(s*0.18,-s*0.4); ctx.lineTo(s*0.27,-s*0.66); ctx.lineTo(s*0.42,-s*0.4); ctx.fill();
      ctx.beginPath(); ctx.moveTo(s*0.34,-s*0.42); ctx.lineTo(s*0.47,-s*0.64); ctx.lineTo(s*0.56,-s*0.36); ctx.fill();
      // Inner ears pink
      ctx.fillStyle = '#ffb6c1';
      ctx.beginPath(); ctx.moveTo(s*0.22,-s*0.4); ctx.lineTo(s*0.29,-s*0.58); ctx.lineTo(s*0.38,-s*0.4); ctx.fill();
      ctx.beginPath(); ctx.moveTo(s*0.38,-s*0.42); ctx.lineTo(s*0.46,-s*0.56); ctx.lineTo(s*0.52,-s*0.37); ctx.fill();
      // Muzzle
      ctx.fillStyle = '#ffe0b2';
      ctx.beginPath(); ctx.ellipse(s*0.38, -s*0.08, s*0.1, s*0.06, 0, 0, Math.PI*2); ctx.fill();
      // Eyes
      const eyeY = -s * 0.22;
      if (sleeping) {
        drawSleepEyes(ctx, s, s*0.26, eyeY, s*0.44, eyeY, s*0.035);
      } else {
        ctx.fillStyle = hunger > 20 ? '#5a5' : '#c44';
        ctx.beginPath(); ctx.ellipse(s*0.26, eyeY, s*0.035, s*0.045, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(s*0.44, eyeY, s*0.035, s*0.045, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.ellipse(s*0.26, eyeY, s*0.011, s*0.035, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(s*0.44, eyeY, s*0.011, s*0.035, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(s*0.27, eyeY - s*0.015, s*0.012, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(s*0.45, eyeY - s*0.015, s*0.012, 0, Math.PI*2); ctx.fill();
      }
      // Triangle nose
      ctx.fillStyle = '#e88';
      ctx.beginPath(); ctx.moveTo(s*0.35,-s*0.1); ctx.lineTo(s*0.38,-s*0.06); ctx.lineTo(s*0.41,-s*0.1); ctx.fill();
      // W mouth
      ctx.strokeStyle = '#a0522d'; ctx.lineWidth = s * 0.012;
      ctx.beginPath();
      ctx.moveTo(s*0.32,-s*0.04); ctx.lineTo(s*0.35,-s*0.02); ctx.lineTo(s*0.38,-s*0.05);
      ctx.lineTo(s*0.41,-s*0.02); ctx.lineTo(s*0.44,-s*0.04); ctx.stroke();
      // Whiskers
      ctx.strokeStyle = '#bbb'; ctx.lineWidth = s * 0.008;
      ctx.beginPath(); ctx.moveTo(s*0.2,-s*0.1); ctx.lineTo(s*0.02,-s*0.14); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(s*0.2,-s*0.07); ctx.lineTo(s*0.01,-s*0.07); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(s*0.2,-s*0.04); ctx.lineTo(s*0.02, 0); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(s*0.56,-s*0.1); ctx.lineTo(s*0.72,-s*0.14); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(s*0.56,-s*0.07); ctx.lineTo(s*0.74,-s*0.07); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(s*0.56,-s*0.04); ctx.lineTo(s*0.72, 0); ctx.stroke();
      if (!sleeping) drawPetLegs(ctx, s, lp, moving, bodyColor);
    }

    /* ── Dog ── */
    function drawDogPet(ctx, s, lp, moving, hunger, action, ap, t) {
      const sleeping = action === 'sleep' || action === 'nap';
      const bodyColor = '#b87333';
      const lightColor = '#d4a574';
      // Tail (wagging, behind body)
      ctx.strokeStyle = bodyColor; ctx.lineWidth = s * 0.07; ctx.lineCap = 'round';
      const wag = moving ? Math.sin(lp * 3) * 0.4 : 0;
      ctx.beginPath(); ctx.moveTo(-s*0.45, -s*0.1);
      ctx.quadraticCurveTo(-s*0.6, -s*0.48 + wag*20, -s*0.42, -s*0.55); ctx.stroke();
      // Body
      ctx.fillStyle = bodyColor;
      ctx.beginPath(); ctx.ellipse(0, 0, s*0.5, s*0.35, 0, 0, Math.PI*2); ctx.fill();
      // Belly
      ctx.fillStyle = lightColor;
      ctx.beginPath(); ctx.ellipse(0, s*0.08, s*0.35, s*0.2, 0, 0, Math.PI*2); ctx.fill();
      // Head
      ctx.fillStyle = bodyColor;
      ctx.beginPath(); ctx.arc(s*0.35, -s*0.14, s*0.28, 0, Math.PI*2); ctx.fill();
      // Floppy ears (behind head)
      ctx.fillStyle = '#8B5E3C';
      ctx.beginPath(); ctx.ellipse(s*0.16, -s*0.06, s*0.09, s*0.22, -0.3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(s*0.52, -s*0.06, s*0.09, s*0.22,  0.3, 0, Math.PI*2); ctx.fill();
      // Snout
      ctx.fillStyle = lightColor;
      ctx.beginPath(); ctx.ellipse(s*0.54, -s*0.06, s*0.13, s*0.11, 0, 0, Math.PI*2); ctx.fill();
      // Eyebrows
      ctx.strokeStyle = '#6b4226'; ctx.lineWidth = s * 0.02;
      ctx.beginPath(); ctx.moveTo(s*0.22,-s*0.26); ctx.lineTo(s*0.32,-s*0.28); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(s*0.38,-s*0.28); ctx.lineTo(s*0.48,-s*0.26); ctx.stroke();
      // Eyes
      if (sleeping) {
        drawSleepEyes(ctx, s, s*0.28, -s*0.18, s*0.42, -s*0.18, s*0.038);
      } else {
        ctx.fillStyle = hunger > 20 ? '#442' : '#c44';
        ctx.beginPath(); ctx.arc(s*0.28, -s*0.18, s*0.038, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(s*0.42, -s*0.18, s*0.038, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(s*0.29, -s*0.19, s*0.014, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(s*0.43, -s*0.19, s*0.014, 0, Math.PI*2); ctx.fill();
      }
      // Big black nose
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.ellipse(s*0.58, -s*0.06, s*0.035, s*0.028, 0, 0, Math.PI*2); ctx.fill();
      // Nose shine
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath(); ctx.arc(s*0.575, -s*0.07, s*0.01, 0, Math.PI*2); ctx.fill();
      // Mouth line
      ctx.strokeStyle = '#6b4226'; ctx.lineWidth = s * 0.01;
      ctx.beginPath(); ctx.moveTo(s*0.58,-s*0.035); ctx.lineTo(s*0.58, s*0.0); ctx.stroke();
      // Tongue if happy
      if (hunger > 50 && !sleeping) {
        ctx.fillStyle = '#ff7b9c';
        ctx.beginPath(); ctx.ellipse(s*0.58, s*0.04, s*0.03, s*0.055, 0, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#e06080'; ctx.lineWidth = s*0.006;
        ctx.beginPath(); ctx.moveTo(s*0.58, s*0.01); ctx.lineTo(s*0.58, s*0.07); ctx.stroke();
      }
      // Collar
      ctx.strokeStyle = '#d22'; ctx.lineWidth = s * 0.035;
      ctx.beginPath(); ctx.arc(s*0.35, -s*0.02, s*0.2, 0.3, Math.PI - 0.3); ctx.stroke();
      // Collar tag
      ctx.fillStyle = '#ffd700';
      ctx.beginPath(); ctx.arc(s*0.35, s*0.16, s*0.025, 0, Math.PI*2); ctx.fill();
      if (!sleeping) drawPetLegs(ctx, s, lp, moving, bodyColor);
    }

    /* ── Bunny ── */
    function drawBunnyPet(ctx, s, lp, moving, hunger, action, ap, t) {
      const sleeping = action === 'sleep' || action === 'nap';
      const bodyColor = '#f0f0f0';
      const pinkColor = '#ffb6c1';
      // Cotton-ball tail
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-s*0.42, 0, s*0.12, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#eee';
      ctx.beginPath(); ctx.arc(-s*0.44, -s*0.03, s*0.05, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(-s*0.38, s*0.04, s*0.04, 0, Math.PI*2); ctx.fill();
      // Body
      ctx.fillStyle = bodyColor;
      ctx.beginPath(); ctx.ellipse(0, 0, s*0.42, s*0.35, 0, 0, Math.PI*2); ctx.fill();
      // Head
      ctx.beginPath(); ctx.arc(s*0.3, -s*0.16, s*0.26, 0, Math.PI*2); ctx.fill();
      // Long ears
      ctx.beginPath(); ctx.ellipse(s*0.2, -s*0.58, s*0.065, s*0.26, -0.15, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(s*0.4, -s*0.55, s*0.065, s*0.24,  0.15, 0, Math.PI*2); ctx.fill();
      // Inner ears
      ctx.fillStyle = pinkColor;
      ctx.beginPath(); ctx.ellipse(s*0.2, -s*0.58, s*0.035, s*0.2, -0.15, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(s*0.4, -s*0.55, s*0.035, s*0.18,  0.15, 0, Math.PI*2); ctx.fill();
      // Eyes
      if (sleeping) {
        drawSleepEyes(ctx, s, s*0.22, -s*0.2, s*0.38, -s*0.2, s*0.04);
      } else {
        ctx.fillStyle = hunger > 20 ? '#c44' : '#833';
        ctx.beginPath(); ctx.arc(s*0.22, -s*0.2, s*0.04, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(s*0.38, -s*0.2, s*0.04, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(s*0.23, -s*0.21, s*0.015, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(s*0.39, -s*0.21, s*0.015, 0, Math.PI*2); ctx.fill();
      }
      // Y-shaped nose
      ctx.fillStyle = pinkColor;
      ctx.beginPath(); ctx.moveTo(s*0.28,-s*0.11); ctx.lineTo(s*0.3,-s*0.08); ctx.lineTo(s*0.32,-s*0.11); ctx.fill();
      // Mouth line
      ctx.strokeStyle = '#caa'; ctx.lineWidth = s * 0.008;
      ctx.beginPath(); ctx.moveTo(s*0.3,-s*0.08); ctx.lineTo(s*0.3,-s*0.04); ctx.stroke();
      // Buck teeth!
      ctx.fillStyle = '#fff';
      ctx.fillRect(s*0.275, -s*0.04, s*0.025, s*0.035);
      ctx.fillRect(s*0.305, -s*0.04, s*0.025, s*0.035);
      ctx.strokeStyle = '#ddd'; ctx.lineWidth = s * 0.005;
      ctx.strokeRect(s*0.275, -s*0.04, s*0.025, s*0.035);
      ctx.strokeRect(s*0.305, -s*0.04, s*0.025, s*0.035);
      // Cheek blush
      ctx.fillStyle = 'rgba(255,182,193,0.35)';
      ctx.beginPath(); ctx.arc(s*0.15, -s*0.1, s*0.045, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(s*0.45, -s*0.1, s*0.045, 0, Math.PI*2); ctx.fill();
      // Whiskers
      ctx.strokeStyle = '#ccc'; ctx.lineWidth = s * 0.006;
      ctx.beginPath(); ctx.moveTo(s*0.17,-s*0.1); ctx.lineTo(s*0.02,-s*0.13); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(s*0.17,-s*0.07); ctx.lineTo(s*0.02,-s*0.05); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(s*0.43,-s*0.1); ctx.lineTo(s*0.58,-s*0.13); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(s*0.43,-s*0.07); ctx.lineTo(s*0.58,-s*0.05); ctx.stroke();
      if (!sleeping) drawPetLegs(ctx, s * 0.9, lp, moving, bodyColor);
    }

    /* ── Hamster ── */
    function drawHamsterPet(ctx, s, lp, moving, hunger, action, ap, t) {
      const sleeping = action === 'sleep' || action === 'nap';
      const bodyColor = '#f5c38a';
      const cheekColor = '#ffe0b2';
      // Super round body
      ctx.fillStyle = bodyColor;
      ctx.beginPath(); ctx.arc(0, 0, s*0.38, 0, Math.PI*2); ctx.fill();
      // White tummy
      ctx.fillStyle = '#fff5e6';
      ctx.beginPath(); ctx.ellipse(s*0.05, s*0.08, s*0.2, s*0.18, 0, 0, Math.PI*2); ctx.fill();
      // Head (big round)
      ctx.fillStyle = bodyColor;
      ctx.beginPath(); ctx.arc(s*0.25, -s*0.1, s*0.3, 0, Math.PI*2); ctx.fill();
      // HUGE puffy cheeks
      ctx.fillStyle = cheekColor;
      ctx.beginPath(); ctx.ellipse(s*0.08, -s*0.01, s*0.16, s*0.14, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(s*0.42, -s*0.01, s*0.16, s*0.14, 0, 0, Math.PI*2); ctx.fill();
      // Cheek blush
      ctx.fillStyle = 'rgba(255,150,150,0.25)';
      ctx.beginPath(); ctx.arc(s*0.08, s*0.02, s*0.08, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(s*0.42, s*0.02, s*0.08, 0, Math.PI*2); ctx.fill();
      // Tiny round ears
      ctx.fillStyle = '#dda070';
      ctx.beginPath(); ctx.arc(s*0.1, -s*0.36, s*0.075, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(s*0.4, -s*0.36, s*0.075, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffb6c1';
      ctx.beginPath(); ctx.arc(s*0.1, -s*0.36, s*0.045, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(s*0.4, -s*0.36, s*0.045, 0, Math.PI*2); ctx.fill();
      // Eyes
      if (sleeping) {
        drawSleepEyes(ctx, s, s*0.18, -s*0.16, s*0.32, -s*0.16, s*0.032);
      } else {
        ctx.fillStyle = '#222';
        ctx.beginPath(); ctx.arc(s*0.18, -s*0.16, s*0.032, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(s*0.32, -s*0.16, s*0.032, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(s*0.185, -s*0.17, s*0.012, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(s*0.325, -s*0.17, s*0.012, 0, Math.PI*2); ctx.fill();
      }
      // Tiny pink nose
      ctx.fillStyle = '#e88';
      ctx.beginPath(); ctx.arc(s*0.25, -s*0.08, s*0.02, 0, Math.PI*2); ctx.fill();
      // W mouth
      ctx.strokeStyle = '#c08060'; ctx.lineWidth = s * 0.008;
      ctx.beginPath();
      ctx.moveTo(s*0.2,-s*0.05); ctx.lineTo(s*0.225,-s*0.035); ctx.lineTo(s*0.25,-s*0.055);
      ctx.lineTo(s*0.275,-s*0.035); ctx.lineTo(s*0.3,-s*0.05); ctx.stroke();
      // Seed near mouth when hungry
      if (hunger < 40) {
        ctx.fillStyle = '#8B7355';
        ctx.beginPath(); ctx.ellipse(s*0.35, -s*0.04, s*0.025, s*0.015, 0.3, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#6b5335'; ctx.lineWidth = s*0.004;
        ctx.beginPath(); ctx.moveTo(s*0.34,-s*0.04); ctx.lineTo(s*0.36,-s*0.04); ctx.stroke();
      }
      // Tiny paws
      ctx.fillStyle = '#f0b67a';
      ctx.beginPath(); ctx.arc(s*0.08, s*0.12, s*0.04, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(s*0.42, s*0.12, s*0.04, 0, Math.PI*2); ctx.fill();
      if (!sleeping) drawPetLegs(ctx, s * 0.75, lp, moving, bodyColor);
    }

    /* ── Fox ── */
    function drawFoxPet(ctx, s, lp, moving, hunger, action, ap, t) {
      const sleeping = action === 'sleep' || action === 'nap';
      const bodyColor = '#e86f2c';
      const whiteColor = '#fff3e0';
      // BIG bushy tail behind body
      ctx.fillStyle = bodyColor;
      ctx.beginPath(); ctx.ellipse(-s*0.48, -s*0.12, s*0.18, s*0.3, -0.5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.ellipse(-s*0.56, -s*0.28, s*0.08, s*0.13, -0.5, 0, Math.PI*2); ctx.fill();
      // Body
      ctx.fillStyle = bodyColor;
      ctx.beginPath(); ctx.ellipse(0, 0, s*0.5, s*0.32, 0, 0, Math.PI*2); ctx.fill();
      // White belly
      ctx.fillStyle = whiteColor;
      ctx.beginPath(); ctx.ellipse(s*0.05, s*0.08, s*0.3, s*0.18, 0, 0, Math.PI*2); ctx.fill();
      // Head
      ctx.fillStyle = bodyColor;
      ctx.beginPath(); ctx.arc(s*0.38, -s*0.14, s*0.27, 0, Math.PI*2); ctx.fill();
      // White face V-marking
      ctx.fillStyle = whiteColor;
      ctx.beginPath();
      ctx.moveTo(s*0.3, -s*0.35); ctx.lineTo(s*0.38, -s*0.02); ctx.lineTo(s*0.46, -s*0.35);
      ctx.quadraticCurveTo(s*0.38, -s*0.28, s*0.3, -s*0.35); ctx.fill();
      // White snout
      ctx.beginPath(); ctx.ellipse(s*0.54, -s*0.04, s*0.13, s*0.1, 0, 0, Math.PI*2); ctx.fill();
      // Tall pointy ears
      ctx.fillStyle = bodyColor;
      ctx.beginPath(); ctx.moveTo(s*0.2,-s*0.32); ctx.lineTo(s*0.26,-s*0.64); ctx.lineTo(s*0.38,-s*0.34); ctx.fill();
      ctx.beginPath(); ctx.moveTo(s*0.38,-s*0.34); ctx.lineTo(s*0.5,-s*0.62); ctx.lineTo(s*0.56,-s*0.3); ctx.fill();
      // Inner ears dark
      ctx.fillStyle = '#444';
      ctx.beginPath(); ctx.moveTo(s*0.24,-s*0.34); ctx.lineTo(s*0.28,-s*0.54); ctx.lineTo(s*0.34,-s*0.34); ctx.fill();
      ctx.beginPath(); ctx.moveTo(s*0.42,-s*0.34); ctx.lineTo(s*0.48,-s*0.52); ctx.lineTo(s*0.52,-s*0.31); ctx.fill();
      // Eyes
      if (sleeping) {
        drawSleepEyes(ctx, s, s*0.3, -s*0.18, s*0.46, -s*0.18, s*0.035);
      } else {
        ctx.fillStyle = '#c90';
        ctx.save();
        ctx.beginPath(); ctx.ellipse(s*0.3, -s*0.18, s*0.035, s*0.025, -0.15, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(s*0.46, -s*0.18, s*0.035, s*0.025,  0.15, 0, Math.PI*2); ctx.fill();
        ctx.restore();
        ctx.fillStyle = '#222';
        ctx.beginPath(); ctx.arc(s*0.3, -s*0.18, s*0.015, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(s*0.46, -s*0.18, s*0.015, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(s*0.305, -s*0.19, s*0.006, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(s*0.465, -s*0.19, s*0.006, 0, Math.PI*2); ctx.fill();
      }
      // Black nose
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.ellipse(s*0.58, -s*0.04, s*0.03, s*0.022, 0, 0, Math.PI*2); ctx.fill();
      // Sly smile
      ctx.strokeStyle = '#a04010'; ctx.lineWidth = s * 0.008;
      ctx.beginPath(); ctx.arc(s*0.52, -s*0.01, s*0.04, 0.1, Math.PI - 0.1); ctx.stroke();
      // Dark socks (legs drawn darker)
      if (!sleeping) drawPetLegs(ctx, s, lp, moving, '#5a2800');
    }

    /* ── Panda ── */
    function drawPandaPet(ctx, s, lp, moving, hunger, action, ap, t) {
      const sleeping = action === 'sleep' || action === 'nap';
      // Bamboo behind body (when not too hungry)
      if (hunger > 30) {
        ctx.strokeStyle = '#5a8a3c'; ctx.lineWidth = s * 0.03; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(-s*0.55, s*0.3); ctx.lineTo(-s*0.35, -s*0.6); ctx.stroke();
        // Bamboo segments
        ctx.strokeStyle = '#4a7a2c'; ctx.lineWidth = s * 0.008;
        ctx.beginPath(); ctx.moveTo(-s*0.5, s*0.05); ctx.lineTo(-s*0.4, s*0.05); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-s*0.45, -s*0.2); ctx.lineTo(-s*0.35, -s*0.2); ctx.stroke();
        // Leaf
        ctx.fillStyle = '#6aaa4c';
        ctx.beginPath(); ctx.ellipse(-s*0.3, -s*0.55, s*0.06, s*0.02, -0.8, 0, Math.PI*2); ctx.fill();
      }
      // Body white
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.ellipse(0, 0, s*0.45, s*0.38, 0, 0, Math.PI*2); ctx.fill();
      // Black shoulders/arms
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.ellipse(-s*0.3, -s*0.05, s*0.16, s*0.22, -0.3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse( s*0.3, -s*0.05, s*0.16, s*0.22,  0.3, 0, Math.PI*2); ctx.fill();
      // Head
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(s*0.05, -s*0.3, s*0.3, 0, Math.PI*2); ctx.fill();
      // Round black ears
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.arc(-s*0.16, -s*0.54, s*0.1, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc( s*0.26, -s*0.54, s*0.1, 0, Math.PI*2); ctx.fill();
      // BIG tilted eye patches
      ctx.fillStyle = '#333';
      ctx.save(); ctx.translate(-s*0.07, -s*0.32); ctx.rotate(-0.25);
      ctx.beginPath(); ctx.ellipse(0, 0, s*0.1, s*0.075, 0, 0, Math.PI*2); ctx.fill(); ctx.restore();
      ctx.save(); ctx.translate(s*0.17, -s*0.32); ctx.rotate(0.25);
      ctx.beginPath(); ctx.ellipse(0, 0, s*0.1, s*0.075, 0, 0, Math.PI*2); ctx.fill(); ctx.restore();
      // Eyes
      if (sleeping) {
        drawSleepEyes(ctx, s, -s*0.07, -s*0.32, s*0.17, -s*0.32, s*0.03);
      } else {
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(-s*0.07, -s*0.32, s*0.03, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc( s*0.17, -s*0.32, s*0.03, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.arc(-s*0.07, -s*0.32, s*0.018, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc( s*0.17, -s*0.32, s*0.018, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(-s*0.065, -s*0.33, s*0.007, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc( s*0.175, -s*0.33, s*0.007, 0, Math.PI*2); ctx.fill();
      }
      // Oval black nose
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.ellipse(s*0.05, -s*0.22, s*0.03, s*0.02, 0, 0, Math.PI*2); ctx.fill();
      // Mouth
      ctx.strokeStyle = '#555'; ctx.lineWidth = s * 0.008;
      ctx.beginPath(); ctx.moveTo(s*0.05,-s*0.2); ctx.lineTo(s*0.05,-s*0.17); ctx.stroke();
      ctx.beginPath(); ctx.arc(s*0.02, -s*0.17, s*0.03, 0, Math.PI*0.5); ctx.stroke();
      ctx.beginPath(); ctx.arc(s*0.08, -s*0.17, s*0.03, Math.PI*0.5, Math.PI); ctx.stroke();
      // Blush
      ctx.fillStyle = 'rgba(255,150,150,0.2)';
      ctx.beginPath(); ctx.arc(-s*0.14, -s*0.22, s*0.04, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc( s*0.24, -s*0.22, s*0.04, 0, Math.PI*2); ctx.fill();
      if (!sleeping) drawPetLegs(ctx, s, lp, moving, '#333');
    }

    /* ── Closed sleep eyes helper ── */
    function drawSleepEyes(ctx, s, x1, y1, x2, y2, r) {
      ctx.strokeStyle = '#555'; ctx.lineWidth = s * 0.018; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.arc(x1, y1, r, Math.PI, 0); ctx.stroke();
      ctx.beginPath(); ctx.arc(x2, y2, r, Math.PI, 0); ctx.stroke();
    }

    /* ── Shared leg drawing ── */
    function drawPetLegs(ctx, s, lp, moving, color) {
      ctx.fillStyle = color;
      const legW = s * 0.08;
      const legH = s * 0.18;
      const swing = moving ? Math.sin(lp) * s * 0.08 : 0;
      // front legs
      ctx.fillRect(s * 0.15 + swing, s * 0.2, legW, legH);
      ctx.fillRect(s * 0.25 - swing, s * 0.2, legW, legH);
      // back legs
      ctx.fillRect(-s * 0.25 - swing, s * 0.2, legW, legH);
      ctx.fillRect(-s * 0.15 + swing, s * 0.2, legW, legH);
    }

    /* ═══════════════════════════════
       Tabs
       ═══════════════════════════════ */
    function switchTab(tabId) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tabId));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tabId));
    }

    function switchSubTab(subId) {
      const panel = document.getElementById(subId);
      if (!panel) return;
      const parent = panel.parentElement;
      parent.querySelectorAll('.sub-panel').forEach(p => p.classList.toggle('active', p.id === subId));
      parent.querySelectorAll('.sub-tab').forEach(b => b.classList.toggle('active', b.dataset.sub === subId));
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    // Sub-tabs (Pet/Plant inside Shop)
    document.querySelectorAll('.sub-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.dataset.sub;
        btn.parentElement.querySelectorAll('.sub-tab').forEach(b => b.classList.toggle('active', b === btn));
        btn.parentElement.parentElement.querySelectorAll('.sub-panel').forEach(p => p.classList.toggle('active', p.id === target));
      });
    });

    // Back button: if visiting, go home; else go to index
    document.querySelector('.back-btn').addEventListener('click', (e) => {
      if (viewingUid !== currentUid) {
        e.preventDefault();
        goHome();
      }
    });

    // Panel collapse toggle
    const panelToggle = document.getElementById('panelToggle');
    const panelWrap = document.getElementById('panelWrap');
    const isMobile = () => window.innerWidth <= 768;
    panelToggle.addEventListener('click', () => {
      const collapsed = panelWrap.classList.toggle('collapsed');
      if (isMobile()) {
        panelToggle.textContent = collapsed ? '▲' : '▼';
      } else {
        panelToggle.textContent = collapsed ? '❯' : '❮';
      }
      // Re-render room canvas after transition completes
      setTimeout(() => {
        startRoomBgAnimation();
        // Also restart pet animation if active
        const activePets = [roomData.pet, roomData.pet2].filter(Boolean);
        if (activePets.length) {
          const petInfos = activePets.map(id => ({
            type: PETS.find(p => p.id === id)?.id || 'cat',
            hunger: roomData.petHunger[id] ?? 100
          }));
          startPetAnimation(petInfos);
        }
      }, 320);
    });
    // Set initial toggle icon based on viewport
    if (isMobile()) panelToggle.textContent = '▼';

    // ═══ Chinese Chess invite listener ═══
    (function() {
      let chessInvUnsub = null;
      const _auth = firebase.auth();
      const _db = firebase.firestore();
      _auth.onAuthStateChanged((u) => {
        if (chessInvUnsub) { chessInvUnsub(); chessInvUnsub = null; }
        if (!u) return;
        console.log('[ChessInvite] Listening for invites on room, uid:', u.uid);
        chessInvUnsub = _db.collection('chess_invites')
          .where('toUid', '==', u.uid)
          .where('status', '==', 'pending')
          .onSnapshot((snap) => {
            snap.docChanges().forEach(ch => {
              if (ch.type !== 'added') return;
              const inv = ch.doc.data();
              const id = ch.doc.id;
              console.log('[ChessInvite] Invite received on room:', id, inv);
              if (document.querySelector('.chess-invite-overlay')) return;
              const ov = document.createElement('div');
              ov.className = 'chess-invite-overlay';
              ov.innerHTML = '<div class="chess-invite-box">' +
                '<h3>♟️ Chess Challenge!</h3>' +
                '<div class="ci-from">' + (inv.fromName||'Someone') + ' invites you</div>' +
                '<div class="ci-bet">🪙 ' + inv.bet + ' coins</div>' +
                '<div class="ci-buttons">' +
                  '<button class="ci-reject">Reject</button>' +
                  '<button class="ci-accept">Accept</button>' +
                '</div></div>';
              document.body.appendChild(ov);
              ov.querySelector('.ci-accept').addEventListener('click', () => {
                ov.remove();
                _db.collection('chess_invites').doc(id).update({status:'accepted'});
                window.location.href = 'chinese-chess.html?join=' + inv.gameId;
              });
              ov.querySelector('.ci-reject').addEventListener('click', () => {
                ov.remove();
                _db.collection('chess_invites').doc(id).update({status:'rejected'});
              });
            });
          }, (err) => { console.error('[ChessInvite] onSnapshot error on room:', err); });
      });
    })();
  </script>
</body>
